<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>💪 WorkOut Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --accent: #f0ff40;
    --accent2: #40ffb0;
    --accent3: #ff4060;
    --text: #f0f0f8;
    --muted: #6060a0;
    --border: #2a2a40;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Prompt', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; color: var(--accent); }
  .streak-badge {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    display: flex; align-items: center; gap: 6px;
  }
  .streak-num { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--accent); }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: none;
    padding: 12px 18px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all .2s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); margin-left: 6px; vertical-align: middle; }

  /* PAGES */
  .page { display: none; padding: 16px; }
  .page.active { display: block; }

  /* TODAY CARD */
  .day-hero {
    background: linear-gradient(135deg, var(--card), #1e1e32);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .day-hero::before {
    content: '';
    position: absolute; top: -30px; right: -30px;
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(240,255,64,0.08), transparent);
    border-radius: 50%;
  }
  .day-label { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 3px; color: var(--muted); }
  .day-name { font-family: 'Bebas Neue', sans-serif; font-size: 42px; color: var(--accent); line-height: 1; }
  .day-focus { font-size: 14px; color: var(--accent2); margin-top: 4px; }
  .progress-bar-wrap { margin-top: 16px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .progress-bar {
    height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px; transition: width .5s cubic-bezier(.4,0,.2,1);
  }
  .checkin-btn {
    width: 100%; margin-top: 16px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: transform .1s, opacity .2s;
  }
  .checkin-btn:active { transform: scale(0.97); }
  .checkin-btn:disabled { opacity: 0.4; cursor: default; }
  .checkin-btn.done { background: var(--accent2); }
  .rest-btn {
    width: 100%; margin-top: 8px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px;
    font-family: 'Prompt', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
  }
  .rest-btn:hover { color: var(--text); border-color: var(--muted); }

  /* EXERCISE LIST */
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--muted);
    margin: 16px 0 10px;
  }
  .exercise-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color .2s;
  }
  .exercise-card.active-ex { border-color: var(--accent); }
  .exercise-card.completed-ex { border-color: var(--accent2); opacity: 0.7; }
  .exercise-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px;
    cursor: pointer;
  }
  .ex-num {
    width: 30px; height: 30px;
    background: var(--border);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: var(--muted);
    flex-shrink: 0;
  }
  .exercise-card.active-ex .ex-num { background: var(--accent); color: var(--bg); }
  .exercise-card.completed-ex .ex-num { background: var(--accent2); color: var(--bg); }
  .ex-info { flex: 1; }
  .ex-name { font-weight: 600; font-size: 15px; }
  .ex-detail { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .ex-arrow { color: var(--muted); font-size: 18px; transition: transform .2s; }
  .exercise-card.open .ex-arrow { transform: rotate(180deg); }

  /* SETS */
  .sets-panel { display: none; padding: 0 14px 14px; }
  .exercise-card.open .sets-panel { display: block; }
  .sets-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); gap: 8px; margin-bottom: 12px; }
  .set-btn {
    background: var(--border);
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 10px 6px;
    text-align: center;
    cursor: pointer;
    transition: all .15s;
    position: relative;
  }
  .set-btn .set-label { font-size: 11px; color: var(--muted); }
  .set-btn .set-reps { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--text); }
  .set-btn.done-set { background: rgba(64,255,176,0.12); border-color: var(--accent2); }
  .set-btn.done-set .set-reps { color: var(--accent2); }
  .set-btn.active-set { border-color: var(--accent); background: rgba(240,255,64,0.08); }
  .set-btn.active-set .set-reps { color: var(--accent); }
  .set-btn .check-icon { position: absolute; top: 4px; right: 4px; font-size: 10px; display: none; }
  .set-btn.done-set .check-icon { display: block; }
  .timer-row {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 13px;
  }
  .timer-icon { font-size: 18px; }
  .timer-label { flex: 1; color: var(--muted); }
  .timer-countdown {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--accent);
    min-width: 48px;
    text-align: right;
  }
  .timer-countdown.warning { color: var(--accent3); }
  .start-timer-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    padding: 6px 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 1px;
    cursor: pointer;
  }
  .start-timer-btn.running { background: var(--accent3); }
  .start-timer-btn.paused { background: var(--accent2); }

  /* TIMER OVERLAY */
  .timer-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.92);
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px;
  }
  .timer-overlay.show { display: flex; }
  .timer-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; color: var(--muted); }
  .timer-big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 96px;
    line-height: 1;
    color: var(--accent);
    transition: color .3s;
  }
  .timer-big.warning { color: var(--accent3); }
  .timer-subtitle { font-size: 14px; color: var(--muted); text-align: center; }
  .timer-ring {
    position: relative;
    width: 200px; height: 200px;
  }
  .timer-ring svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
  .timer-ring-text {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  circle.bg { fill: none; stroke: var(--border); stroke-width: 6; }
  circle.fg { fill: none; stroke: var(--accent); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset .5s linear, stroke .3s; }
  circle.fg.warning { stroke: var(--accent3); }
  .timer-actions { display: flex; gap: 12px; }
  .timer-skip-btn, .timer-stop-btn {
    border: none; border-radius: 12px;
    padding: 12px 28px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 1px;
    cursor: pointer;
    transition: transform .1s;
  }
  .timer-skip-btn:active, .timer-stop-btn:active { transform: scale(0.96); }
  .timer-skip-btn { background: var(--accent); color: var(--bg); }
  .timer-stop-btn { background: var(--card); color: var(--muted); border: 1px solid var(--border); }
  .timer-type-badge {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 13px; color: var(--accent2);
  }

  /* CALENDAR */
  .calendar-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 4px; margin-bottom: 16px;
  }
  .cal-day-header { text-align: center; font-size: 11px; color: var(--muted); padding: 4px 0; }
  .cal-day {
    aspect-ratio: 1;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
    background: var(--card);
    color: var(--muted);
    position: relative;
  }
  .cal-day.today { border: 2px solid var(--accent); color: var(--accent); }
  .cal-day.checked { background: rgba(64,255,176,0.15); color: var(--accent2); }
  .cal-day.checked::after {
    content: '✓';
    position: absolute; bottom: 2px; right: 4px;
    font-size: 9px; color: var(--accent2);
  }
  .cal-day.rest-day { background: rgba(96,96,160,0.1); color: var(--muted); }
  .cal-day.empty { background: transparent; }
  .cal-month { font-family: 'Bebas Neue', sans-serif; font-size: 20px; margin-bottom: 12px; letter-spacing: 2px; }

  /* STATS */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
  }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 40px; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* STICKERS */
  .sticker-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .sticker {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 22px;
    display: flex; flex-direction: column; align-items: center;
    min-width: 70px;
    position: relative;
  }
  .sticker.earned { border-color: var(--accent2); background: rgba(64,255,176,0.08); }
  .sticker.earned::after { content: '✓'; position: absolute; top: 4px; right: 6px; font-size: 10px; color: var(--accent2); }
  .sticker-label { font-size: 10px; color: var(--muted); margin-top: 4px; text-align: center; }
  .sticker.earned .sticker-label { color: var(--accent2); }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--accent);
    color: var(--bg);
    border-radius: 20px;
    padding: 12px 24px;
    font-weight: 700;
    font-size: 15px;
    z-index: 300;
    transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* CONFETTI */
  .confetti-piece {
    position: fixed;
    width: 8px; height: 8px;
    border-radius: 2px;
    z-index: 400;
    pointer-events: none;
    animation: confetti-fall 1.5s ease-in forwards;
  }
  @keyframes confetti-fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
  .points-pop {
    position: fixed;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--accent);
    z-index: 300;
    pointer-events: none;
    animation: pop-up 1s ease-out forwards;
  }
  @keyframes pop-up {
    0% { transform: translateY(0) scale(0.5); opacity: 0; }
    30% { transform: translateY(-20px) scale(1.2); opacity: 1; }
    100% { transform: translateY(-60px) scale(1); opacity: 0; }
  }

  .points-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    color: var(--accent);
  }

  /* WORKOUT DONE BANNER */
  .done-banner {
    background: linear-gradient(135deg, rgba(64,255,176,0.15), rgba(240,255,64,0.08));
    border: 1px solid var(--accent2);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    margin-bottom: 16px;
  }
  .done-banner .done-emoji { font-size: 48px; display: block; margin-bottom: 8px; }
  .done-banner h2 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--accent2); letter-spacing: 2px; }
  .done-banner p { font-size: 13px; color: var(--muted); margin-top: 4px; }
</style>
</head>

  }
};

const STICKERS = [
  { emoji: '🌱', label: 'เริ่มต้น', threshold: 1 },
  { emoji: '🔥', label: '3 วัน', threshold: 3 },
  { emoji: '⚡', label: '7 วัน', threshold: 7 },
  { emoji: '💪', label: '14 วัน', threshold: 14 },
  { emoji: '🏅', label: '21 วัน', threshold: 21 },
  { emoji: '🥇', label: '30 วัน', threshold: 30 },
  { emoji: '🚀', label: '50 วัน', threshold: 50 },
  { emoji: '👑', label: '100 วัน', threshold: 100 },
];

// ============================================================
// STATE
// ============================================================
function loadState() {
  try { return JSON.parse(localStorage.getItem('pumplog_v2') || '{}'); } catch(e) { return {}; }
}
function saveState() { localStorage.setItem('pumplog_v2', JSON.stringify(state)); }

let state = loadState();
if (!state.checkins) state.checkins = {}; // date -> { done, points, sets: {exIdx: [bool]} }
if (!state.totalPoints) state.totalPoints = 0;

// ============================================================
// TIMER STATE
// ============================================================
let timer = { id: null, seconds: 0, total: 0, onDone: null, type: '', label: '' };
const TIMER_SET = 60;    // set rest: 1 min
const TIMER_EX  = 90;   // exercise rest: 1.5 min

// ============================================================
// HELPERS
// ============================================================
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function todayDow() { return new Date().getDay(); }
function getSchedule() { return SCHEDULE[todayDow()]; }
function getCheckin(key) { return state.checkins[key] || { done: false, points: 0, sets: {} }; }

function streak() {
  let count = 0, d = new Date();
  while (true) {
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (state.checkins[k] && state.checkins[k].done) { count++; d.setDate(d.getDate()-1); }
    else break;
  }
  return count;
}

function totalCheckins() { return Object.values(state.checkins).filter(v => v.done).length; }

// ============================================================
// RENDER TODAY
// ============================================================
function renderToday() {
  const dow = todayDow();
  const sched = SCHEDULE[dow];
  const key = todayKey();
  const checkin = getCheckin(key);
  const d = new Date();

  document.getElementById('todayDate').textContent =
    d.toLocaleDateString('th-TH', { weekday:'short', day:'numeric', month:'short' });
  document.getElementById('dayName').textContent = sched.name;
  document.getElementById('dayFocus').textContent = sched.focus;

  // progress
  const exs = sched.exercises;
  const setsInfo = checkin.sets || {};
  let totalSets = 0, doneSets = 0;
  exs.forEach((ex, i) => {
    totalSets += ex.sets;
    const doneArr = setsInfo[i] || [];
    doneSets += doneArr.filter(Boolean).length;
  });
  const pct = totalSets ? Math.round(doneSets/totalSets*100) : 0;
  document.getElementById('progressText').textContent = `${doneSets} / ${totalSets} เซต`;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';

  // buttons
  const masterBtn = document.getElementById('masterCheckin');
  const restBtn = document.getElementById('restDayBtn');
  if (checkin.done) {
    masterBtn.textContent = '✓ เช็คอินแล้ววันนี้!';
    masterBtn.classList.add('done');
    masterBtn.disabled = true;
    restBtn.style.display = 'none';
  } else {
    masterBtn.disabled = pct < 100 && !sched.isRest;
    masterBtn.classList.remove('done');
    masterBtn.textContent = pct === 100 ? '🎉 เช็คอิน!' : '✓ CHECK IN วันนี้';
    if (sched.isRest) {
      restBtn.style.display = 'block';
      masterBtn.style.display = 'none';
    } else {
      restBtn.style.display = 'none';
      masterBtn.style.display = 'block';
    }
  }

  // exercise list
  const list = document.getElementById('exerciseList');
  if (sched.isRest && !checkin.done) {
    list.innerHTML = `<div class="done-banner">
      <span class="done-emoji">${dow === 0 ? '🛋️' : '🚶'}</span>
      <h2>${sched.name === 'พฤหัส' ? 'วันพักเบา' : 'วันพักเต็มที่'}</h2>
      <p>${sched.note || ''}</p>
    </div>`;
    if (sched.note) list.innerHTML += buildExerciseList(sched, checkin, key);
    return;
  }
  if (checkin.done && pct === 100) {
    list.innerHTML = `<div class="done-banner">
      <span class="done-emoji">🏆</span>
      <h2>ทำได้แล้ว!</h2>
      <p>+${checkin.points} แต้มวันนี้ 🎉</p>
    </div>` + buildExerciseList(sched, checkin, key);
  } else {
    list.innerHTML = buildExerciseList(sched, checkin, key);
  }
}

function buildExerciseList(sched, checkin, key) {
  let html = `<div class="section-title">ท่าออกกำลังกาย</div>`;
  sched.exercises.forEach((ex, i) => {
    const setsInfo = checkin.sets || {};
    const doneArr = setsInfo[i] || new Array(ex.sets).fill(false);
    const allDone = doneArr.every(Boolean);
    const anyDone = doneArr.some(Boolean);
    const cardClass = allDone ? 'completed-ex' : (anyDone ? 'active-ex' : '');
    html += `<div class="exercise-card ${cardClass} ${anyDone && !allDone ? 'open' : ''}" id="exCard${i}">
      <div class="exercise-header" onclick="toggleExCard(${i})">
        <div class="ex-num">${allDone ? '✓' : i+1}</div>
        <div class="ex-info">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-detail">${ex.detail} · ${doneArr.filter(Boolean).length}/${ex.sets} เซต</div>
        </div>
        <div class="ex-arrow">▾</div>
      </div>
      <div class="sets-panel" id="setsPanel${i}">
        <div class="sets-grid">`;
    for (let s = 0; s < ex.sets; s++) {
      const done = doneArr[s];
      const isNext = !done && (s === 0 || doneArr[s-1]);
      html += `<div class="set-btn ${done ? 'done-set' : (isNext ? 'active-set' : '')}" onclick="toggleSet(${i},${s})">
        <span class="check-icon">✓</span>
        <div class="set-label">เซต ${s+1}</div>
        <div class="set-reps">${ex.reps}</div>
      </div>`;
    }
    html += `</div>
        <div class="timer-row" id="timerRow${i}">
          <span class="timer-icon">⏱</span>
          <span class="timer-label" id="timerLabel${i}">พักระหว่างเซต 60 วิ</span>
          <span class="timer-countdown" id="timerCountdown${i}">1:00</span>
          <button class="start-timer-btn" id="startTimerBtn${i}" onclick="startSetTimer(${i})">เริ่ม</button>
        </div>
      </div>
    </div>`;
  });
  return html;
}

function toggleExCard(i) {
  const card = document.getElementById(`exCard${i}`);
  card.classList.toggle('open');
}

// ============================================================
// SET LOGIC
// ============================================================
function toggleSet(exIdx, setIdx) {
  const key = todayKey();
  if (!state.checkins[key]) state.checkins[key] = { done: false, points: 0, sets: {} };
  const checkin = state.checkins[key];
  if (!checkin.sets) checkin.sets = {};
  const sched = getSchedule();
  const ex = sched.exercises[exIdx];
  if (!checkin.sets[exIdx]) checkin.sets[exIdx] = new Array(ex.sets).fill(false);

  const wasTrue = checkin.sets[exIdx][setIdx];
  checkin.sets[exIdx][setIdx] = !wasTrue;

  const justCompleted = !wasTrue;
  if (justCompleted) {
    // add points
    checkin.points = (checkin.points || 0) + 5;
    state.totalPoints = (state.totalPoints || 0) + 5;
    showPointsPop('+5');
    // check if all sets of this exercise done
    const allSetsDone = checkin.sets[exIdx].every(Boolean);
    if (allSetsDone) {
      // check if all exercises done
      const allExDone = sched.exercises.every((e, i) => {
        const arr = checkin.sets[i] || [];
        return arr.filter(Boolean).length >= e.sets;
      });
      if (allExDone) {
        checkin.points += 20;
        state.totalPoints += 20;
        // auto check-in
        checkin.done = true;
        saveState();
        updateUI();
        setTimeout(() => {
          launchConfetti();
          showToast('🏆 ทำครบแล้ว! +20 แต้มโบนัส');
        }, 300);
        return;
      } else {
        // start exercise rest timer
        saveState();
        updateUI();
        setTimeout(() => {
          const nextEx = findNextExercise(exIdx, sched, checkin);
          startExTimer(nextEx ? nextEx.name : 'ท่าถัดไป');
        }, 100);
        return;
      }
    } else {
      // start set rest timer
      saveState();
      updateUI();
      setTimeout(() => startSetTimerAuto(exIdx), 100);
      return;
    }
  }

  saveState();
  updateUI();
}

function findNextExercise(currentIdx, sched, checkin) {
  for (let i = currentIdx + 1; i < sched.exercises.length; i++) {
    const arr = checkin.sets[i] || [];
    if (arr.filter(Boolean).length < sched.exercises[i].sets) return sched.exercises[i];
  }
  return null;
}

// ============================================================
// TIMERS
// ============================================================
function startSetTimer(exIdx) {
  startTimerOverlay(TIMER_SET, 'พักระหว่างเซต', `เซต ${exIdx+1} — พักให้หายใจ`, () => {});
}
function startSetTimerAuto(exIdx) {
  startTimerOverlay(TIMER_SET, 'พักระหว่างเซต', 'เซตต่อไปพร้อมยัง?', () => {});
}
function startExTimer(nextName) {
  startTimerOverlay(TIMER_EX, 'พักระหว่างท่า', `ถัดไป: ${nextName}`, () => {});
}

function startTimerOverlay(seconds, type, subtitle, onDone) {
  if (timer.id) clearInterval(timer.id);
  timer = { id: null, seconds, total: seconds, onDone, type, label: subtitle };
  document.getElementById('timerTypeBadge').textContent = type;
  document.getElementById('timerTitle').textContent = type;
  document.getElementById('timerSub').textContent = subtitle;
  const overlay = document.getElementById('timerOverlay');
  overlay.classList.add('show');
  updateTimerDisplay();
  timer.id = setInterval(() => {
    timer.seconds--;
    updateTimerDisplay();
    if (timer.seconds <= 0) {
      clearInterval(timer.id); timer.id = null;
      overlay.classList.remove('show');
      vibrate();
      showToast('⏰ หมดเวลาพัก — เริ่มได้เลย!');
      if (timer.onDone) timer.onDone();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const s = timer.seconds;
  const min = Math.floor(s/60);
  const sec = String(s%60).padStart(2,'0');
  const txt = `${min}:${sec}`;
  const big = document.getElementById('timerBig');
  const circle = document.getElementById('timerCircle');
  big.textContent = txt;
  const warn = s <= 10;
  big.classList.toggle('warning', warn);
  circle.classList.toggle('warning', warn);
  const circ = 2 * Math.PI * 88;
  const offset = circ * (1 - timer.seconds / timer.total);
  circle.style.strokeDashoffset = offset;
}

function stopTimer() {
  if (timer.id) clearInterval(timer.id); timer.id = null;
  document.getElementById('timerOverlay').classList.remove('show');
}
function skipTimer() { stopTimer(); }

function vibrate() { if (navigator.vibrate) navigator.vibrate([200,100,200]); }

// ============================================================
// CHECK IN
// ============================================================
function masterCheckinClick() {
  const key = todayKey();
  if (!state.checkins[key]) state.checkins[key] = { done: false, points: 0, sets: {} };
  state.checkins[key].done = true;
  state.checkins[key].points = (state.checkins[key].points || 0) + 10;
  state.totalPoints = (state.totalPoints || 0) + 10;
  saveState();
  updateUI();
  launchConfetti();
  showToast('🎉 เช็คอินสำเร็จ! +10 แต้ม');
}

function markRestDay() {
  const key = todayKey();
  if (!state.checkins[key]) state.checkins[key] = { done: false, points: 0, sets: {} };
  state.checkins[key].done = true;
  state.checkins[key].points = (state.checkins[key].points || 0) + 5;
  state.checkins[key].isRest = true;
  state.totalPoints = (state.totalPoints || 0) + 5;
  saveState();
  updateUI();
  showToast('😌 เช็คอินวันพักแล้ว +5 แต้ม');
}

// ============================================================
// CALENDAR
// ============================================================
function renderCalendar() {
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  document.getElementById('calMonth').textContent =
    now.toLocaleDateString('th-TH', { month:'long', year:'numeric' });

  const headers = ['อา','จ','อ','พ','พฤ','ศ','ส'];
  let html = headers.map(h => `<div class="cal-day-header">${h}</div>`).join('');

  const firstDay = new Date(year, month, 1).getDay();
  for (let i = 0; i < firstDay; i++) html += `<div class="cal-day empty"></div>`;
  const days = new Date(year, month+1, 0).getDate();
  for (let d = 1; d <= days; d++) {
    const key = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const ck = state.checkins[key];
    const dow = new Date(year, month, d).getDay();
    const isToday = d === now.getDate();
    const isRest = SCHEDULE[dow].isRest;
    let cls = '';
    if (isToday) cls += ' today';
    if (ck && ck.done) cls += ' checked';
    else if (isRest) cls += ' rest-day';
    html += `<div class="cal-day${cls}">${d}</div>`;
  }
  document.getElementById('calGrid').innerHTML = html;

  // stickers
  const total = totalCheckins();
  let sHtml = '';
  STICKERS.forEach(s => {
    const earned = total >= s.threshold;
    sHtml += `<div class="sticker ${earned ? 'earned' : ''}">
      <span style="filter:${earned?'none':'grayscale(1) opacity(0.3)'}">${s.emoji}</span>
      <div class="sticker-label">${s.label}</div>
    </div>`;
  });
  document.getElementById('stickerRow').innerHTML = sHtml;
}

// ============================================================
// STATS
// ============================================================
function renderStats() {
  const total = totalCheckins();
  const s = streak();
  const pts = state.totalPoints || 0;
  const weeks = Math.floor(total / 5);
  const g = document.getElementById('statsGrid');
  g.innerHTML = `
    <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">🗓 วันที่เช็คอิน</div></div>
    <div class="stat-card"><div class="stat-value">${s}</div><div class="stat-label">🔥 สตรีคปัจจุบัน</div></div>
    <div class="stat-card"><div class="stat-value">${pts}</div><div class="stat-label">⚡ แต้มสะสม</div></div>
    <div class="stat-card"><div class="stat-value">${weeks}</div><div class="stat-label">📅 สัปดาห์ที่ครบ</div></div>
  `;

  // history
  const entries = Object.entries(state.checkins)
    .filter(([,v]) => v.done)
    .sort((a,b) => b[0].localeCompare(a[0]))
    .slice(0, 14);
  let hHtml = '';
  entries.forEach(([k, v]) => {
    const dd = new Date(k + 'T00:00:00');
    const dow = dd.getDay();
    const sched = SCHEDULE[dow];
    hHtml += `<div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--card);border-radius:12px;margin-bottom:8px;">
      <div style="font-size:28px">${v.isRest ? '😴' : '✅'}</div>
      <div style="flex:1">
        <div style="font-weight:600;font-size:14px">${sched.name} — ${sched.focus}</div>
        <div style="font-size:12px;color:var(--muted)">${dd.toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'})}</div>
      </div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent)">+${v.points||0}</div>
    </div>`;
  });
  document.getElementById('historyList').innerHTML = hHtml || '<div style="color:var(--muted);text-align:center;padding:20px">ยังไม่มีประวัติ</div>';
}

// ============================================================
// UI UTILS
// ============================================================
function updateUI() {
  document.getElementById('streakNum').textContent = streak();
  document.getElementById('pointsDisplay').textContent = state.totalPoints || 0;
  const active = document.querySelector('.tab.active').getAttribute('onclick').match(/\'(\w+)\'/)[1];
  if (active === 'today') renderToday();
  if (active === 'calendar') renderCalendar();
  if (active === 'stats') renderStats();
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('page-'+name).classList.add('active');
  if (name === 'today') renderToday();
  if (name === 'calendar') renderCalendar();
  if (name === 'stats') renderStats();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function showPointsPop(text) {
  const el = document.createElement('div');
  el.className = 'points-pop';
  el.textContent = text;
  el.style.left = (Math.random() * 60 + 20) + '%';
  el.style.top = '40%';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1100);
}

function launchConfetti() {
  const colors = ['#f0ff40','#40ffb0','#ff4060','#fff','#ffd700'];
  for (let i = 0; i < 40; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*30}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-delay:${Math.random()*0.5}s;
      animation-duration:${1.2+Math.random()*0.8}s;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2500);
  }
}

// ============================================================
// INIT
// ============================================================
renderToday();
document.getElementById('streakNum').textContent = streak();
document.getElementById('pointsDisplay').textContent = state.totalPoints || 0;
</script>
</body>
</html>
