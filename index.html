<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>💪 FitStreak</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body { min-height:100vh; background:#0A0A0F; font-family:'Prompt','Segoe UI',sans-serif; color:#fff; overflow-x:hidden; }

.header { background:linear-gradient(135deg,#1a1a2e,#16213e); padding:16px 20px 0; border-bottom:1px solid #222; position:sticky; top:0; z-index:100; backdrop-filter:blur(12px); }
.header-inner { max-width:480px; margin:0 auto; }
.header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.brand-sub { font-size:10px; color:#555; letter-spacing:3px; }
.brand-name { font-size:22px; font-weight:900; letter-spacing:1px; }
.header-right { display:flex; gap:10px; align-items:center; }
.streak-chip { background:#1a1a2e; border:1px solid #2a2a3e; border-radius:20px; padding:5px 12px; font-size:13px; display:flex; align-items:center; gap:5px; }
.streak-chip-val { font-family:‘Bebas Neue’,sans-serif; font-size:20px; color:#FF6B35; }
.points-wrap { text-align:right; }
.points-label { font-size:10px; color:#555; letter-spacing:2px; }
.points-val { font-size:24px; font-weight:900; color:#FFE66D; font-family:‘Bebas Neue’,sans-serif; }
.nav { display:flex; border-radius:12px 12px 0 0; overflow:hidden; }
.nav-btn { flex:1; padding:9px 0; border:none; cursor:pointer; background:transparent; color:#555; font-size:10px; letter-spacing:1px; text-transform:uppercase; font-family:inherit; transition:all .2s; }
.nav-btn.active { background:#0A0A0F; color:#fff; font-weight:700; border-radius:8px 8px 0 0; }

.main { max-width:480px; margin:0 auto; padding:20px 16px 80px; }
.page { display:none; }
.page.active { display:block; }

.stats-row { display:flex; gap:10px; margin-bottom:18px; }
.stat-card-home { flex:1; border-radius:14px; padding:14px 10px; text-align:center; }
.stat-card-home.s-streak { background:linear-gradient(135deg,#FF6B35,#ff8c42); }
.stat-card-home.s-plain { background:#1a1a2e; border:1px solid #2a2a3e; }
.stat-val { font-size:28px; font-weight:900; font-family:‘Bebas Neue’,sans-serif; }
.stat-lbl { font-size:10px; opacity:.7; letter-spacing:1px; margin-top:2px; }

.today-card { background:#1a1a2e; border:2px solid; border-radius:20px; padding:20px; margin-bottom:14px; position:relative; overflow:hidden; }
.today-bg-emoji { position:absolute; top:-16px; right:-16px; font-size:80px; opacity:.07; pointer-events:none; }
.today-sub { font-size:10px; color:#555; letter-spacing:2px; margin-bottom:4px; }
.today-title { font-size:19px; font-weight:800; margin-bottom:2px; }
.today-meta { font-size:12px; color:#555; margin-bottom:12px; }
.today-progress-wrap { margin-bottom:14px; }
.today-progress-labels { display:flex; justify-content:space-between; font-size:11px; color:#555; margin-bottom:5px; }
.today-progress-bar { background:#111; border-radius:99px; height:5px; overflow:hidden; }
.today-progress-fill { height:100%; border-radius:99px; transition:width .5s; }
.big-btn { width:100%; padding:16px; border-radius:14px; border:none; cursor:pointer; font-size:15px; font-weight:900; font-family:inherit; }
.big-btn:disabled { opacity:.4; cursor:default; }
.big-btn.done-btn { background:#2a2a3e; color:#888; cursor:default; }
.rest-tip { background:#1a1a2e; border-radius:12px; padding:10px 14px; margin-bottom:14px; font-size:11px; color:#666; display:flex; gap:8px; }

.badge-progress { background:#1a1a2e; border-radius:16px; padding:14px 16px; margin-bottom:12px; display:flex; align-items:center; gap:14px; border:1px solid #2a2a3e; }
.badge-emoji-big { font-size:34px; }
.badge-info { flex:1; }
.badge-sub-lbl { font-size:11px; color:#666; }
.badge-title-lbl { font-size:14px; font-weight:700; margin-bottom:6px; }
.badge-bar { background:#111; border-radius:99px; height:5px; overflow:hidden; }
.badge-bar-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,#FF6B35,#FFE66D); transition:width .5s; }
.badge-count-lbl { font-size:10px; color:#555; margin-top:3px; }
.badges-section { background:#1a1a2e; border-radius:16px; padding:14px 16px; border:1px solid #2a2a3e; margin-bottom:14px; }
.section-label { font-size:10px; color:#555; letter-spacing:3px; margin-bottom:10px; }
.badges-grid { display:flex; flex-wrap:wrap; gap:8px; }
.badge-item { background:#111; border-radius:10px; padding:8px 10px; text-align:center; }
.badge-item-emoji { font-size:26px; }
.badge-item-lbl { font-size:10px; color:#666; margin-top:2px; }

.ex-section-title { font-family:‘Bebas Neue’,sans-serif; font-size:16px; letter-spacing:2px; color:#555; margin:16px 0 10px; }
.exercise-card { background:#1a1a2e; border:1px solid #2a2a3e; border-radius:14px; margin-bottom:10px; overflow:hidden; transition:border-color .2s; }
.exercise-card.active-ex { border-color:#FF6B35; }
.exercise-card.completed-ex { border-color:#4ECDC4; opacity:.75; }
.exercise-header { display:flex; align-items:center; gap:12px; padding:14px; cursor:pointer; }
.ex-num-box { width:30px; height:30px; background:#2a2a3e; border-radius:8px; display:flex; align-items:center; justify-content:center; font-family:‘Bebas Neue’,sans-serif; font-size:16px; color:#555; flex-shrink:0; transition:all .2s; }
.exercise-card.active-ex .ex-num-box { background:#FF6B35; color:#000; }
.exercise-card.completed-ex .ex-num-box { background:#4ECDC4; color:#000; }
.ex-info { flex:1; }
.ex-name { font-weight:700; font-size:15px; }
.ex-detail { font-size:11px; color:#555; margin-top:2px; }
.ex-arrow { color:#444; font-size:16px; transition:transform .2s; }
.exercise-card.open .ex-arrow { transform:rotate(180deg); }
.sets-panel { display:none; padding:0 14px 14px; }
.exercise-card.open .sets-panel { display:block; }
.sets-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(70px,1fr)); gap:8px; margin-bottom:12px; }
.set-btn { background:#111; border:2px solid #2a2a3e; border-radius:10px; padding:10px 6px; text-align:center; cursor:pointer; transition:all .15s; position:relative; }
.set-btn .set-lbl { font-size:10px; color:#555; }
.set-btn .set-reps { font-family:‘Bebas Neue’,sans-serif; font-size:20px; color:#ccc; }
.set-btn.done-set { background:rgba(78,205,196,.12); border-color:#4ECDC4; }
.set-btn.done-set .set-reps { color:#4ECDC4; }
.set-btn.active-set { border-color:#FF6B35; background:rgba(255,107,53,.08); }
.set-btn.active-set .set-reps { color:#FF6B35; }
.set-btn .check-icon { position:absolute; top:3px; right:5px; font-size:9px; display:none; color:#4ECDC4; }
.set-btn.done-set .check-icon { display:block; }
.timer-row { display:flex; align-items:center; gap:8px; background:#111; border-radius:10px; padding:10px 12px; font-size:12px; }
.timer-icon { font-size:16px; }
.timer-label { flex:1; color:#555; }
.timer-countdown { font-family:‘Bebas Neue’,sans-serif; font-size:20px; color:#FF6B35; min-width:44px; text-align:right; }
.timer-countdown.warning { color:#ff4060; }
.start-timer-btn { background:#FF6B35; color:#000; border:none; border-radius:8px; padding:5px 12px; font-family:‘Bebas Neue’,sans-serif; font-size:14px; cursor:pointer; }

.timer-overlay { display:none; position:fixed; inset:0; z-index:200; background:rgba(0,0,0,.93); flex-direction:column; align-items:center; justify-content:center; gap:20px; }
.timer-overlay.show { display:flex; }
.timer-type-badge { background:#1a1a2e; border:1px solid #2a2a3e; border-radius:20px; padding:6px 16px; font-size:12px; color:#4ECDC4; }
.timer-ring { position:relative; width:200px; height:200px; }
.timer-ring svg { position:absolute; top:0; left:0; transform:rotate(-90deg); }
.timer-ring-inner { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.timer-title-txt { font-family:‘Bebas Neue’,sans-serif; font-size:14px; letter-spacing:3px; color:#555; }
.timer-big { font-family:‘Bebas Neue’,sans-serif; font-size:60px; line-height:1; color:#FF6B35; transition:color .3s; }
.timer-big.warning { color:#ff4060; }
.timer-subtitle { font-size:12px; color:#555; text-align:center; padding:0 16px; }
.timer-actions { display:flex; gap:12px; }
.timer-skip-btn { background:#FF6B35; color:#000; border:none; border-radius:12px; padding:12px 28px; font-family:‘Bebas Neue’,sans-serif; font-size:18px; cursor:pointer; }
.timer-stop-btn { background:#1a1a2e; color:#555; border:1px solid #2a2a3e; border-radius:12px; padding:12px 28px; font-family:‘Bebas Neue’,sans-serif; font-size:18px; cursor:pointer; }
circle.bg { fill:none; stroke:#222; stroke-width:6; }
circle.fg { fill:none; stroke:#FF6B35; stroke-width:6; stroke-linecap:round; transition:stroke-dashoffset .5s linear,stroke .3s; }
circle.fg.warning { stroke:#ff4060; }

.done-banner { background:linear-gradient(135deg,rgba(78,205,196,.12),rgba(255,230,109,.06)); border:1px solid #4ECDC4; border-radius:16px; padding:20px; text-align:center; margin-bottom:16px; }
.done-banner .done-emoji { font-size:48px; display:block; margin-bottom:8px; }
.done-banner h2 { font-family:‘Bebas Neue’,sans-serif; font-size:26px; color:#4ECDC4; letter-spacing:2px; }
.done-banner p { font-size:12px; color:#666; margin-top:4px; }

.cal-month { font-family:‘Bebas Neue’,sans-serif; font-size:20px; margin-bottom:12px; letter-spacing:2px; color:#FF6B35; }
.calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:16px; }
.cal-day-header { text-align:center; font-size:11px; color:#555; padding:4px 0; }
.cal-day { aspect-ratio:1; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; background:#1a1a2e; color:#444; border:1px solid #222; position:relative; }
.cal-day.today { border:2px solid #FF6B35; color:#FF6B35; }
.cal-day.checked { background:rgba(255,107,53,.15); color:#FF6B35; border-color:rgba(255,107,53,.4); }
.cal-day.checked::after { content:‘✓’; position:absolute; bottom:2px; right:4px; font-size:9px; color:#FF6B35; }
.cal-day.rest-day { background:rgba(96,96,160,.1); color:#444; }
.cal-day.empty { background:transparent; border-color:transparent; }
.sticker-row { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
.sticker { background:#1a1a2e; border:1px solid #2a2a3e; border-radius:12px; padding:10px 14px; font-size:22px; display:flex; flex-direction:column; align-items:center; min-width:70px; position:relative; }
.sticker.earned { border-color:#4ECDC4; background:rgba(78,205,196,.08); }
.sticker.earned::after { content:‘✓’; position:absolute; top:4px; right:6px; font-size:10px; color:#4ECDC4; }
.sticker-label { font-size:10px; color:#555; margin-top:4px; text-align:center; }
.sticker.earned .sticker-label { color:#4ECDC4; }

.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
.stat-card-stats { background:#1a1a2e; border:1px solid #2a2a3e; border-radius:14px; padding:16px; }
.stat-value { font-family:‘Bebas Neue’,sans-serif; font-size:40px; color:#FF6B35; line-height:1; }
.stat-label-stats { font-size:12px; color:#555; margin-top:4px; }

.schedule-day { margin-bottom:8px; border:1px solid #2a2a3e; border-radius:16px; overflow:hidden; background:#1a1a2e; }
.day-header-row { display:flex; align-items:center; gap:12px; padding:14px 16px; cursor:pointer; }
.day-icon { width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.day-name-txt { font-weight:700; font-size:14px; }
.today-tag { font-size:9px; border-radius:4px; padding:2px 6px; letter-spacing:1px; font-weight:700; color:#000; }
.day-focus-txt { font-size:11px; color:#777; margin-top:1px; }
.day-arrow-sch { font-size:11px; color:#444; margin-left:auto; }
.day-body { padding:0 16px 14px; border-top:1px solid #ffffff08; display:none; }
.day-body.open { display:block; }
.sch-ex-row { display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid #ffffff06; align-items:center; }
.sch-ex-num { font-size:11px; color:#555; margin-right:8px; }
.rest-info-box { margin-top:10px; padding:7px 10px; background:#ffffff07; border-radius:8px; font-size:10px; color:#555; }
.day-note { margin-top:8px; padding:7px 10px; background:rgba(255,107,53,.08); border-radius:8px; font-size:11px; color:#FF6B35; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
NUTRITION PAGE — redesigned
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

/* Day banner */
.nutr-day-banner {
border-radius:16px; padding:14px 16px;
margin-bottom:16px;
display:flex; align-items:center; gap:12px;
}
.nutr-day-emoji { font-size:32px; flex-shrink:0; }
.nutr-day-label { font-size:10px; color:rgba(255,255,255,.5); letter-spacing:2px; }
.nutr-day-title { font-size:15px; font-weight:700; }

/* Big calorie ring */
.nutr-cal-section {
background:#1a1a2e; border:1px solid #2a2a3e;
border-radius:20px; padding:20px 16px;
margin-bottom:12px;
}
.nutr-cal-top {
display:flex; align-items:center; gap:16px; margin-bottom:16px;
}
.nutr-ring-wrap { position:relative; width:100px; height:100px; flex-shrink:0; }
.nutr-ring-wrap svg { transform:rotate(-90deg); }
.nutr-ring-center {
position:absolute; inset:0;
display:flex; flex-direction:column; align-items:center; justify-content:center;
}
.nutr-ring-val { font-family:‘Bebas Neue’,sans-serif; font-size:22px; line-height:1; color:#FF6B35; }
.nutr-ring-unit { font-size:9px; color:#555; letter-spacing:1px; margin-top:2px; }
.nutr-cal-info { flex:1; }
.nutr-cal-eaten { font-family:‘Bebas Neue’,sans-serif; font-size:38px; line-height:1; color:#FF6B35; }
.nutr-cal-eaten-lbl { font-size:11px; color:#555; margin-bottom:8px; }
.nutr-cal-row { display:flex; gap:6px; flex-wrap:wrap; }
.nutr-cal-chip {
background:#111; border-radius:8px; padding:5px 10px;
font-size:11px; font-weight:600; border:1px solid #2a2a3e;
}
.nutr-cal-chip span { font-family:‘Bebas Neue’,sans-serif; font-size:15px; }

/* Macro 4-cards */
.nutr-macro-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.nmacro {
border-radius:14px; padding:12px 8px;
text-align:center; border:1px solid transparent;
position:relative; overflow:hidden;
background:#111;
}
.nmacro-track {
position:absolute; bottom:0; left:0; right:0;
height:3px; background:#222;
}
.nmacro-fill { height:100%; border-radius:99px; transition:width .5s; }
.nmacro-icon { font-size:18px; margin-bottom:4px; }
.nmacro-eaten { font-family:‘Bebas Neue’,sans-serif; font-size:22px; line-height:1; }
.nmacro-unit { font-size:9px; color:#555; }
.nmacro-goal { font-size:10px; color:#444; margin-top:3px; }
.nmacro-rem { font-size:10px; margin-top:4px; font-weight:700; }
.nmacro.done { border-color:rgba(78,205,196,.3); }

/* Water */
.nutr-water-card {
background:#1a1a2e; border:1px solid #2a2a3e;
border-radius:16px; padding:14px 16px;
margin-top:12px; margin-bottom:16px;
display:flex; align-items:center; gap:12px;
}
.nutr-water-left { flex:1; }
.nutr-water-title { font-size:13px; font-weight:700; margin-bottom:4px; }
.nutr-water-sub { font-size:11px; color:#555; }
.nutr-water-bar-wrap { background:#111; border-radius:99px; height:8px; overflow:hidden; margin-top:8px; }
.nutr-water-bar-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,#74b9ff,#0984e3); transition:width .5s; }
.nutr-water-btns { display:flex; flex-direction:column; gap:5px; }
.nutr-water-btn {
background:#74b9ff22; border:1px solid #74b9ff44;
border-radius:10px; padding:6px 12px; color:#74b9ff;
font-size:12px; font-weight:700; cursor:pointer; font-family:inherit;
white-space:nowrap;
}
.nutr-water-reset { font-size:10px; color:#444; background:none; border:none; cursor:pointer; font-family:inherit; margin-top:4px; text-align:center; }

/* Food log */
.nutr-log-card {
background:#1a1a2e; border:1px solid #2a2a3e;
border-radius:20px; padding:16px;
margin-bottom:16px;
}
.nutr-log-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.nutr-log-title { font-size:14px; font-weight:700; }
.nutr-log-clear { background:none; border:1px solid #2a2a3e; border-radius:8px; padding:4px 10px; color:#666; font-size:11px; cursor:pointer; font-family:inherit; }

.nutr-log-item {
display:flex; align-items:center; gap:10px;
padding:9px 0; border-bottom:1px solid #ffffff06;
}
.nutr-log-item:last-of-type { border-bottom:none; }
.nutr-log-dot { width:8px; height:8px; border-radius:50%; background:#FF6B35; flex-shrink:0; }
.nutr-log-name { flex:1; font-size:13px; }
.nutr-log-kcal { font-family:‘Bebas Neue’,sans-serif; font-size:17px; color:#FF6B35; }
.nutr-log-del { background:none; border:none; color:#333; cursor:pointer; font-size:16px; padding:0 4px; }
.nutr-log-empty { color:#444; font-size:12px; text-align:center; padding:14px 0; }

.nutr-add-row { display:flex; gap:6px; margin-top:10px; width:100%; overflow:hidden; }
.nutr-add-select {
flex:1; min-width:0; background:#111; border:1px solid #2a2a3e; border-radius:10px;
padding:9px 10px; color:#fff; font-size:12px; font-family:inherit; outline:none;
overflow:hidden; text-overflow:ellipsis;
}
.nutr-add-btn {
flex:0 0 auto; background:#FF6B35; color:#000; border:none; border-radius:10px;
padding:9px 14px; font-weight:900; font-size:13px; cursor:pointer; font-family:inherit; white-space:nowrap;
}

/* ── API KEY SETUP ── */
.api-key-card {
background:#1a1a2e; border:1px solid #FF6B3544; border-radius:16px;
padding:14px 16px; margin-bottom:14px;
}
.api-key-card.has-key { border-color:#4ECDC444; }
.api-key-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.api-key-title { font-size:13px; font-weight:700; }
.api-key-status { font-size:11px; padding:3px 10px; border-radius:20px; font-weight:700; }
.api-key-status.ok { background:rgba(78,205,196,.15); color:#4ECDC4; }
.api-key-status.missing { background:rgba(255,107,53,.15); color:#FF6B35; }
.api-key-row { display:flex; gap:6px; }
.api-key-input {
flex:1; min-width:0; background:#111; border:1px solid #2a2a3e; border-radius:10px;
padding:9px 12px; color:#fff; font-size:12px; font-family:inherit; outline:none;
letter-spacing:1px;
}
.api-key-input:focus { border-color:#FF6B35; }
.api-key-save { flex:0 0 auto; background:#FF6B35; color:#000; border:none; border-radius:10px; padding:9px 14px; font-weight:900; font-size:13px; cursor:pointer; font-family:inherit; }
.api-key-clear { font-size:11px; color:#555; background:none; border:none; cursor:pointer; font-family:inherit; margin-top:6px; text-decoration:underline; }
.api-key-hint { font-size:10px; color:#555; margin-top:6px; line-height:1.5; }
.nutr-loading { text-align:center; padding:30px; color:#555; font-size:14px; }
.nutr-loading-spinner { font-size:32px; animation:spin 1s linear infinite; display:block; margin-bottom:8px; }
.nutr-error { background:rgba(255,64,96,.1); border:1px solid rgba(255,64,96,.3); border-radius:12px; padding:14px; color:#ff8a9a; font-size:13px; margin-bottom:12px; }

/* ── MEAL CARDS ── */
.meal-section-title { font-family:‘Bebas Neue’,sans-serif; font-size:14px; letter-spacing:2px; color:#555; margin:16px 0 8px; }
.meal-cat-tabs { display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; margin-bottom:10px; padding-bottom:2px; }
.meal-cat-tabs::-webkit-scrollbar { display:none; }
.meal-cat-btn {
flex:0 0 auto; background:#1a1a2e; border:1px solid #2a2a3e; border-radius:20px;
padding:6px 14px; font-size:12px; color:#555; cursor:pointer; font-family:inherit;
white-space:nowrap; transition:all .2s;
}
.meal-cat-btn.active { background:rgba(255,107,53,.12); border-color:#FF6B3566; color:#FF6B35; font-weight:700; }
.meal-cards-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
.meal-card {

function streak(){
  let count=0;const d=new Date();
  while(true){
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if(state.checkins[k]&&state.checkins[k].done){count++;d.setDate(d.getDate()-1);}else break;
  }return count;
}
function totalCheckins(){return Object.values(state.checkins).filter(v=>v.done).length;}
function fmt(s){const m=Math.floor(s/60),sec=s%60;return`${m}:${String(sec).padStart(2,'0')}`;}
function vibrate(){if(navigator.vibrate)navigator.vibrate([200,100,200]);}

function unlockAudio(){
  if(window._audioCtx) return;
  try{ window._audioCtx=new(window.AudioContext||window.webkitAudioContext)(); }catch{}
}
document.addEventListener('touchstart', unlockAudio, {once:true});
document.addEventListener('click', unlockAudio, {once:true});

function beep(beeps){
  try{
    const ctx=window._audioCtx||(window._audioCtx=new(window.AudioContext||window.webkitAudioContext)());
    if(ctx.state==='suspended') ctx.resume();
    beeps.forEach(b=>{
      const osc=ctx.createOscillator(),gain=ctx.createGain(),now=ctx.currentTime;
      osc.connect(gain);gain.connect(ctx.destination);
      osc.type=b.type||'sine';osc.frequency.value=b.freq;
      gain.gain.setValueAtTime(0,now+b.start);
      gain.gain.linearRampToValueAtTime(b.vol||0.7,now+b.start+0.01);
      gain.gain.linearRampToValueAtTime(0,now+b.start+b.dur);
      osc.start(now+b.start);osc.stop(now+b.start+b.dur+0.05);
    });
  }catch(e){console.warn('audio',e);}
}

// ── TIMER (wall-clock based — survives backgrounding) ──
let timer={id:null,seconds:0,total:0,onDone:null,type:'',label:'',startWallTime:null};

function startTimerOverlay(seconds,type,subtitle,onDone){
  if(timer.id)clearInterval(timer.id);
  timer={id:null,seconds,total:seconds,onDone,type,label:subtitle,startWallTime:Date.now()};
  localStorage.setItem('activeTimer',JSON.stringify({startWallTime:Date.now(),total:seconds,type,subtitle}));
  document.getElementById('timerTypeBadge').textContent=type;
  document.getElementById('timerTitle').textContent=type;
  document.getElementById('timerSub').textContent=subtitle;
  document.getElementById('timerOverlay').classList.add('show');
  updateTimerDisplay();
  timer.id=setInterval(timerTick,500);
}
function timerTick(){
  const elapsed=Math.floor((Date.now()-timer.startWallTime)/1000);
  timer.seconds=Math.max(0,timer.total-elapsed);
  updateTimerDisplay();
  if(timer.seconds<=0){
    clearInterval(timer.id);timer.id=null;
    localStorage.removeItem('activeTimer');
    document.getElementById('timerOverlay').classList.remove('show');
    vibrate();playAlertSound();showToast('⏰ หมดเวลาพัก — เริ่มได้เลย!');
    if(timer.onDone)timer.onDone();
  }
}
function updateTimerDisplay(){
  const s=timer.seconds;
  const big=document.getElementById('timerBig'),circle=document.getElementById('timerCircle');
  big.textContent=fmt(s);const warn=s<=10;
  big.classList.toggle('warning',warn);circle.classList.toggle('warning',warn);
  circle.style.strokeDashoffset=(2*Math.PI*88)*(1-timer.seconds/timer.total);
}
function stopTimer(){if(timer.id)clearInterval(timer.id);timer.id=null;localStorage.removeItem('activeTimer');document.getElementById('timerOverlay').classList.remove('show');}
function skipTimer(){stopTimer();}
function startSetTimer(exIdx){startTimerOverlay(TIMER_SET,'พักระหว่างเซต',`เซต ${exIdx+1} — พักให้หายใจ`,()=>{});}
function startSetTimerAuto(){startTimerOverlay(TIMER_SET,'พักระหว่างเซต','เซตต่อไปพร้อมยัง?',()=>{});}
function startExTimer(nextName){startTimerOverlay(TIMER_EX,'พักระหว่างท่า',`ถัดไป: ${nextName}`,()=>{});}

// Resume timer
(function(){
  try{
    const saved=JSON.parse(localStorage.getItem('activeTimer')||'null');
    if(!saved)return;
    const remaining=saved.total-Math.floor((Date.now()-saved.startWallTime)/1000);
    if(remaining>0)startTimerOverlay(remaining,saved.type,saved.subtitle,()=>{});
    else localStorage.removeItem('activeTimer');
  }catch{}
})();
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&timer.id)timerTick();});

function buildExerciseList(sched,checkin){
  const setsInfo=checkin.sets||{};
  let html=`<div class="ex-section-title">ท่าออกกำลังกายวันนี้</div>`;
  sched.exercises.forEach((ex,i)=>{
    const doneArr=setsInfo[i]||new Array(ex.sets).fill(false);
    const allDone=doneArr.every(Boolean),anyDone=doneArr.some(Boolean);
    html+=`<div class="exercise-card ${allDone?'completed-ex':(anyDone?'active-ex':'')} ${anyDone&&!allDone?'open':''}" id="exCard${i}">
      <div class="exercise-header" onclick="toggleExCard(${i})">
        <div class="ex-num-box">${allDone?'✓':i+1}</div>
        <div class="ex-info"><div class="ex-name">${ex.name}</div><div class="ex-detail">${ex.detail} · ${doneArr.filter(Boolean).length}/${ex.sets} เซต</div></div>
        <div class="ex-arrow">▾</div>
      </div>
      <div class="sets-panel" id="setsPanel${i}"><div class="sets-grid">`;
    for(let s=0;s<ex.sets;s++){
      const done=doneArr[s],isNext=!done&&(s===0||doneArr[s-1]);
      html+=`<div class="set-btn ${done?'done-set':(isNext?'active-set':'')}" onclick="toggleSet(${i},${s})"><span class="check-icon">✓</span><div class="set-lbl">เซต ${s+1}</div><div class="set-reps">${ex.reps}</div></div>`;
    }
    html+=`</div><div class="timer-row"><span class="timer-icon">⏱</span><span class="timer-label">พักระหว่างเซต 60 วิ</span><span class="timer-countdown">1:00</span><button class="start-timer-btn" onclick="startSetTimer(${i})">เริ่ม</button></div></div></div>`;
  });
  return html;
}
function toggleExCard(i){document.getElementById(`exCard${i}`).classList.toggle('open');}

function toggleSet(exIdx,setIdx){
  const key=todayKeyFn(),checkin=getCheckin(key),sched=getSchedule(),ex=sched.exercises[exIdx];
  if(!checkin.sets[exIdx])checkin.sets[exIdx]=new Array(ex.sets).fill(false);
  const wasTrue=checkin.sets[exIdx][setIdx];
  checkin.sets[exIdx][setIdx]=!wasTrue;
  if(!wasTrue){
    checkin.points=(checkin.points||0)+5;state.totalPoints=(state.totalPoints||0)+5;
    showPointsPop('+5');playSetDoneSound();
    if(navigator.vibrate)navigator.vibrate([50,30,50]);
    const allSetsDone=checkin.sets[exIdx].every(Boolean);
    if(allSetsDone){
      const allExDone=sched.exercises.every((e,i)=>(checkin.sets[i]||[]).filter(Boolean).length>=e.sets);
      if(allExDone){checkin.points+=20;state.totalPoints+=20;checkin.done=true;saveState();updateUI();setTimeout(()=>{launchConfetti();showToast('🏆 ทำครบแล้ว! +20 แต้มโบนัส');showCelebration(checkin.points,'done');},300);return;}
      else{saveState();updateUI();setTimeout(()=>{const nxt=findNextExercise(exIdx,sched,checkin);startExTimer(nxt?nxt.name:'ท่าถัดไป');},100);return;}
    } else {saveState();updateUI();setTimeout(()=>startSetTimerAuto(),100);return;}
  }
  saveState();updateUI();
}
function findNextExercise(idx,sched,checkin){
  for(let i=idx+1;i<sched.exercises.length;i++)if((checkin.sets[i]||[]).filter(Boolean).length<sched.exercises[i].sets)return sched.exercises[i];
  return null;
}
function masterCheckinClick(){
  const key=todayKeyFn(),checkin=getCheckin(key);
  checkin.done=true;checkin.points=(checkin.points||0)+10;state.totalPoints=(state.totalPoints||0)+10;
  saveState();updateUI();launchConfetti();showToast('🎉 เช็คอินสำเร็จ! +10 แต้ม');showCelebration(checkin.points,'workout');
}
function markRestDay(){
  const key=todayKeyFn(),checkin=getCheckin(key);
  checkin.done=true;checkin.points=(checkin.points||0)+5;checkin.isRest=true;state.totalPoints=(state.totalPoints||0)+5;
  saveState();updateUI();showToast('😌 เช็คอินวันพักแล้ว +5 แต้ม');showCelebration(checkin.points,'rest');
}
function showCelebration(pts,type){
  const s=streak(),el=document.getElementById('celebration');
  const em=['🌟','🔥','💎','⚡','🏆','💪','🎯','🚀'];
  document.getElementById('celebEmoji').textContent=type==='rest'?'😌':(type==='done'?'🏆':em[Math.floor(Math.random()*em.length)]);
  document.getElementById('celebPts').textContent=`+${pts} แต้ม 🎯`;
  document.getElementById('celebFires').textContent='🔥'.repeat(Math.min(s,7));
  document.getElementById('celebStreak').textContent=`Streak: ${s} วัน!`;
  el.classList.remove('hidden');setTimeout(()=>el.classList.add('hidden'),3000);
}

function renderCalendar(){
  const now=new Date(),year=now.getFullYear(),month=now.getMonth();

  const headers=['อา','จ','อ','พ','พฤ','ศ','ส'];
  let html=headers.map(h=>`<div class="cal-day-header">${h}</div>`).join('');
  const firstDay=new Date(year,month,1).getDay();
  for(let i=0;i<firstDay;i++)html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=new Date(year,month+1,0).getDate();d++){
    const key=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const ck=state.checkins[key],dow=new Date(year,month,d).getDay(),isToday=d===now.getDate(),isRest=SCHEDULE[dow].isRest;
    let cls='';if(isToday)cls+=' today';if(ck&&ck.done)cls+=' checked';else if(isRest)cls+=' rest-day';
    html+=`<div class="cal-day${cls}">${d}</div>`;

  document.getElementById('stickerRow').innerHTML=STICKERS.map(s=>{
    const earned=total>=s.threshold;
    return`<div class="sticker ${earned?'earned':''}"><span style="filter:${earned?'none':'grayscale(1) opacity(0.3)'}">${s.emoji}</span><div class="sticker-label">${s.label}</div></div>`;
  }).join('');
}

    fat: log.reduce((a,f)=>a+(f.fat||0),0),
    carb: log.reduce((a,f)=>a+(f.carbs||0),0),

}

  <div class="meal-section-title">⭐ เมนูที่กินบ่อย</div>
  <div class="meal-cat-tabs">
    ${MEAL_CATS.map(c=>`<button class="meal-cat-btn ${activeMealCat===c?'active':''}" onclick="setMealCat('${c}')">${c}</button>`).join('')}
  </div>
  <div class="meal-cards-grid">
    ${(activeMealCat==='ทั้งหมด'?MY_MEALS:MY_MEALS.filter(m=>m.cat===activeMealCat)).map((m,_,__)=>{
      const realIdx=MY_MEALS.indexOf(m);
      const isW=m.isWater;
      const calColor=m.calories>700?'#ff4060':m.calories>400?'#FF6B35':'#4ECDC4';
      const protPct=Math.min(Math.round((m.protein/getTodayGoals().protein)*100),100);
      return `<div class="meal-card ${isW?'water-card':''}" onclick="showMealInfo(${realIdx})">
        <div class="meal-card-emoji">${m.emoji}</div>
        <div class="meal-card-name">${m.food}</div>
        ${isW
          ?`<div class="meal-card-kcal" style="color:#74b9ff">${m.waterMl}ml</div><div style="font-size:10px;color:#555;margin-top:2px">0 kcal</div>`
          :`<div class="meal-card-kcal" style="color:${calColor}">${m.calories}</div>
           <div class="meal-card-macros">
             <span class="meal-card-chip" style="color:#4ECDC4">P ${m.protein}g</span>
             <span class="meal-card-chip" style="color:#FFE66D">F ${m.fat}g</span>
             <span class="meal-card-chip" style="color:#A8E6CF">C ${m.carbs}g</span>
           </div>`}
        <div class="meal-card-bar"><div class="meal-card-bar-fill" style="width:${protPct}%;background:${isW?'#74b9ff':'#4ECDC4'}"></div></div>
      </div>`;
    }).join('')}
  </div>
  <div id="nutrResult"></div>
  <div id="nutrHistoryWrap" style="display:none">
    <div class="ex-section-title" style="margin-top:4px">ที่ถามล่าสุด</div>
    <div id="nutrHistory"></div>
  </div>`;

  el.innerHTML=h;
  if(nutrQueryHistory.length)renderNutrHistory();
}

function macroCard(icon,label,eaten,goal,unit,color){
  const pct=Math.min(Math.round((eaten/goal)*100),100);
  const rem=goal-eaten;
  const done=eaten>=goal;
  return`<div class="nmacro${done?' done':''}" style="${done?`border-color:${color}44`:``}">
    <div class="nmacro-icon">${icon}</div>
    <div class="nmacro-eaten" style="color:${done?color:'#ccc'}">${eaten}</div>
    <div class="nmacro-unit">${unit}</div>
    <div class="nmacro-goal">/ ${goal}${unit}</div>
    <div class="nmacro-rem" style="color:${done?color:rem<goal*0.2?'#FFE66D':'#555'}">${done?'✅ ครบ':rem+unit+' เหลือ'}</div>
    <div class="nmacro-track"><div class="nmacro-fill" style="width:${pct}%;background:${color}"></div></div>
  </div>`;
}

function addFoodFromSelect(){
  const sel=document.getElementById('foodSelect');
  if(!sel||sel.value==='')return;
  const meal=MY_MEALS[parseInt(sel.value)];
  if(meal.isWater){addWaterMl(meal.waterMl||600);return;}
  const k=todayKeyFn();
  if(!state.foodLog[k])state.foodLog[k]=[];
  state.foodLog[k].push({food:meal.food,calories:meal.calories,protein:meal.protein,fat:meal.fat,carbs:meal.carbs});
  saveState();showToast(`✅ เพิ่ม ${meal.food} แล้ว`);renderNutrition();
}
function addCurrentMealToLog(){
  if(!currentNutrResult)return;
  const m=currentNutrResult;
  if(m.isWater){addWaterMl(m.waterMl||600);return;}
  const k=todayKeyFn();
  if(!state.foodLog[k])state.foodLog[k]=[];
  state.foodLog[k].push({food:m.food,calories:m.calories,protein:m.protein,fat:m.fat,carbs:m.carbs});
  saveState();showToast(`✅ เพิ่ม ${m.food} ลงบันทึกแล้ว`);renderNutrition();
}
function removeFoodLog(idx){const k=todayKeyFn();if(!state.foodLog[k])return;state.foodLog[k].splice(idx,1);saveState();renderNutrition();}
function clearFoodLog(){state.foodLog[todayKeyFn()]=[];saveState();renderNutrition();}

// ── API KEY MANAGEMENT ──
function getApiKey(){return localStorage.getItem('fs_gemini_key')||'';}
function saveApiKey(){
  const v=document.getElementById('apiKeyInput').value.trim();
  if(!v){showToast('❌ กรุณาใส่ API Key');return;}
  localStorage.setItem('fs_gemini_key',v);
  showToast('✅ บันทึก Gemini API Key แล้ว');
  renderNutrition();
}
function clearApiKey(){localStorage.removeItem('fs_gemini_key');renderNutrition();showToast('🗑 ลบ API Key แล้ว');}
function renderApiKeyCard(){
  const key=getApiKey();
  const masked=key?'···'+key.slice(-6):'';
  return `<div class="api-key-card ${key?'has-key':''}">
    <div class="api-key-top">
      <span class="api-key-title">🔑 Google Gemini API Key</span>
      <span class="api-key-status ${key?'ok':'missing'}">${key?'✓ พร้อมใช้':'ยังไม่ได้ตั้ง'}</span>
    </div>
    ${key
      ? `<div style="font-size:12px;color:#4ECDC4;margin-bottom:6px">AIza···${masked}</div>
         <button class="api-key-clear" onclick="clearApiKey()">เปลี่ยน / ลบ API Key</button>`
      : `<div class="api-key-row">
           <input class="api-key-input" id="apiKeyInput" type="password" placeholder="AIzaSy..." />
           <button class="api-key-save" onclick="saveApiKey()">บันทึก</button>
         </div>
         <div class="api-key-hint">รับฟรีที่ <b>aistudio.google.com</b> → Get API Key<br>Key จะเก็บเฉพาะในเครื่องของคุณ ไม่ส่งไปที่อื่น</div>`
    }
  </div>`;
}

function quickAsk(text){document.getElementById('nutrInput').value=text;askNutrition();}
async function askNutrition(){
  const apiKey=getApiKey();
  if(!apiKey){showToast('❌ ใส่ Gemini API Key ก่อน');renderNutrition();return;}
  const input=document.getElementById('nutrInput'),btn=document.getElementById('nutrAskBtn');
  const query=input.value.trim();if(!query)return;
  const resultEl=document.getElementById('nutrResult');
  btn.disabled=true;btn.textContent='⏳';
  resultEl.innerHTML=`<div class="nutr-loading"><span class="nutr-loading-spinner">⚙️</span>กำลังวิเคราะห์...</div>`;
  const prompt=`คุณคือผู้เชี่ยวชาญด้านโภชนาการ วิเคราะห์สารอาหารของ: "${query}"
ตอบเป็น JSON เท่านั้น ไม่มีข้อความอื่น ไม่มี markdown:
{"food":"ชื่ออาหาร","serving":"ขนาด","calories":0,"protein":0.0,"fat":0.0,"carbs":0.0,"fiber":0.0,"sugar":0.0,"note":"หมายเหตุ 1-2 ประโยค"}`;
  try{
    const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
    const res=await fetch(url,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        contents:[{parts:[{text:prompt}]}],
        generationConfig:{temperature:0.1,maxOutputTokens:512},
      })
    });
    const data=await res.json();
    if(data.error) throw new Error(data.error.message||'Gemini error');
    const raw=(data.candidates?.[0]?.content?.parts?.[0]?.text||'').replace(/```json|```/g,'').trim();
    if(!raw) throw new Error('ไม่ได้รับข้อมูลจาก Gemini');
    const info=JSON.parse(raw);
    currentNutrResult=info;displayNutrResult(info);
    nutrQueryHistory.unshift(info);if(nutrQueryHistory.length>10)nutrQueryHistory.pop();
    renderNutrHistory();input.value='';
  }catch(e){
    const msg=e.message||'';
    const isAuth=msg.includes('API_KEY')||msg.includes('401')||msg.includes('403');
    resultEl.innerHTML=`<div class="nutr-error">❌ ${isAuth?'API Key ไม่ถูกต้อง — ตรวจสอบที่ aistudio.google.com':msg||'เกิดข้อผิดพลาด ลองใหม่'}</div>`;
  }
  btn.disabled=false;btn.textContent='ถาม AI';
}
function showMealInfo(idx){
  currentNutrResult=MY_MEALS[idx];
  displayNutrResult(MY_MEALS[idx]);
  nutrQueryHistory.unshift(MY_MEALS[idx]);if(nutrQueryHistory.length>10)nutrQueryHistory.pop();
  renderNutrHistory();
  setTimeout(()=>document.getElementById('nutrResult').scrollIntoView({behavior:'smooth',block:'nearest'}),100);
}
function displayNutrResult(info){
  const el=document.getElementById('nutrResult');if(!el)return;
  const goals=getTodayGoals();
  const pctCal=Math.min(Math.round((info.calories/goals.cal)*100),999);
  const pctP=Math.min(Math.round(((info.protein||0)/goals.protein)*100),999);
  const pctF=Math.min(Math.round(((info.fat||0)/goals.fat)*100),999);
  const pctC=Math.min(Math.round(((info.carbs||0)/goals.carb)*100),999);
  const isW=info.isWater;
  el.innerHTML=`<div class="nutr-result-card">
    <div class="nutr-result-food">${isW?'💧':'🍽️'} ${info.food} <span style="font-size:11px;color:#555;font-weight:400">(${info.serving||''})</span></div>
    ${isW?`<div style="text-align:center;padding:20px">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:48px;color:#74b9ff">${info.waterMl}ml</div>
      <div style="font-size:12px;color:#555">ไม่มีแคลอรี่ — นับยอดน้ำ</div>
    </div>`:
    `<div class="nutr-result-grid">
      <div class="nutr-result-item"><div class="nutr-result-label">🔥 แคลอรี่</div><div class="nutr-result-val" style="color:#FF6B35">${info.calories} <span style="font-size:13px">kcal</span></div></div>
      <div class="nutr-result-item"><div class="nutr-result-label">🥩 โปรตีน</div><div class="nutr-result-val" style="color:#4ECDC4">${info.protein} <span style="font-size:13px">g</span></div></div>
      <div class="nutr-result-item"><div class="nutr-result-label">🥑 ไขมัน</div><div class="nutr-result-val" style="color:#FFE66D">${info.fat} <span style="font-size:13px">g</span></div></div>
      <div class="nutr-result-item"><div class="nutr-result-label">🍚 คาร์บ</div><div class="nutr-result-val" style="color:#A8E6CF">${info.carbs} <span style="font-size:13px">g</span></div></div>
      <div class="nutr-result-item"><div class="nutr-result-label">🌾 ไฟเบอร์</div><div class="nutr-result-val" style="color:#C3A6FF">${info.fiber||0} <span style="font-size:13px">g</span></div></div>
      <div class="nutr-result-item"><div class="nutr-result-label">🍬 น้ำตาล</div><div class="nutr-result-val" style="color:#F38181">${info.sugar||0} <span style="font-size:13px">g</span></div></div>
    </div>
    <div class="nutr-result-note">${info.note||''}</div>
    <div class="nutr-vs-goal" style="margin-top:14px">
      <div style="font-size:10px;color:#555;letter-spacing:2px;margin-bottom:8px">% ของเป้าหมายวันนี้</div>
      ${['แคลอรี่','โปรตีน','ไขมัน','คาร์บ'].map((l,i)=>{
        const p=[pctCal,pctP,pctF,pctC][i],c=['#FF6B35','#4ECDC4','#FFE66D','#A8E6CF'][i];
        return`<div class="nutr-vs-row"><span class="nutr-vs-lbl">${l}</span><div class="nutr-vs-bar-wrap"><div class="nutr-vs-bar-fill" style="width:${p}%;background:${c}"></div></div><span class="nutr-vs-pct">${p}%</span></div>`;
      }).join('')}`}
    <button class="nutr-result-add-btn" onclick="addCurrentMealToLog()">+ บันทึกลงรายการวันนี้</button>
  </div>`;
}
function renderNutrHistory(){
  const wrap=document.getElementById('nutrHistoryWrap'),el=document.getElementById('nutrHistory');
  if(!wrap||!el)return;
  if(!nutrQueryHistory.length){wrap.style.display='none';return;}
  wrap.style.display='block';
  el.innerHTML=nutrQueryHistory.map((info,i)=>`
    <div class="nutr-hist-item" onclick="currentNutrResult=nutrQueryHistory[${i}];displayNutrResult(nutrQueryHistory[${i}])">
      <div class="nutr-hist-icon">${info.isWater?'💧':'🍽️'}</div>
      <div><div class="nutr-hist-name">${info.food}</div>
      <div class="nutr-hist-cal">${info.isWater?info.waterMl+'ml น้ำ':info.calories+' kcal · P '+info.protein+'g'}</div></div>
    </div>`).join('');
}

function setMealCat(cat){activeMealCat=cat;renderNutrition();}
function updateHeaderStats(){
  document.getElementById('streakNum').textContent=streak();
  document.getElementById('pointsDisplay').textContent=state.totalPoints||0;
}
function updateUI(){
  updateHeaderStats();
  const active=document.querySelector('.page.active');if(!active)return;
  const id=active.id;
  if(id==='page-today')     renderToday();
  if(id==='page-calendar')  renderCalendar();
  if(id==='page-schedule')  renderSchedule();
  if(id==='page-stats')     renderStats();
  if(id==='page-nutrition') renderNutrition();
}
function switchTab(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(name==='today')     renderToday();
  if(name==='calendar')  renderCalendar();
  if(name==='schedule')  renderSchedule();
  if(name==='stats')     renderStats();
  if(name==='nutrition') renderNutrition();
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function showPointsPop(text){const el=document.createElement('div');el.className='points-pop';el.textContent=text;el.style.left=(Math.random()*60+20)+'%';el.style.top='40%';document.body.appendChild(el);setTimeout(()=>el.remove(),1100);}
function launchConfetti(){
  const colors=['#FF6B35','#FFE66D','#4ECDC4','#fff','#A8E6CF','#ff4060'];
  for(let i=0;i<40;i++){const el=document.createElement('div');el.className='confetti-piece';el.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*30}%;background:${colors[Math.floor(Math.random()*colors.length)]};animation-delay:${Math.random()*.5}s;animation-duration:${1.2+Math.random()*.8}s;`;document.body.appendChild(el);setTimeout(()=>el.remove(),2500);}
}

renderToday();
updateHeaderStats();
</script>
