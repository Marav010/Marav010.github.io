<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ปฏิทินการจองห้องพัก — Jingjai Cat Hotel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="login-container" class="login-container">
    <div class="login-card">
      <h2>เข้าสู่ระบบจัดการการจอง</h2>
      <form onsubmit="handleLogin(event)">
        <input type="email" id="email" placeholder="อีเมล" required>
        <input type="password" id="password" placeholder="รหัสผ่าน" required>
        <button type="submit" class="login-btn">เข้าสู่ระบบ</button>
      </form>
      <div id="auth-message" class="auth-message"></div>
    </div>
  </div>

  <div id="app-container" class="container" style="display:none;">
    <header>
      <div class="header-left">
        <div class="logo">
          <img src="Logo/JingJai Cat Hotel final1.jpg" alt="JingjaiCatHotel">
        </div>
        <div>
          <h1>ปฏิทินการจองห้องพัก</h1>
          <p class="lead">ธันวาคม 2568 - มกราคม 2569</p>
        </div>
      </div>
      <div class="header-actions">
        <button class="add-btn" onclick="showFormPopup()">+ เพิ่มการจองใหม่</button>
        <button class="logout-btn" onclick="handleLogout()">ออกจากระบบ</button>
      </div>
    </header>

    <div class="cal-grid">
      <div class="cal" id="cal-dec">
        <div class="month-head">
          <div class="month-title">ธันวาคม <span class="year-sub">2568</span></div>
        </div>
        <div class="weekdays" id="wd-dec"></div>
        <div class="days" id="days-dec"></div>
      </div>
      <div class="cal" id="cal-jan">
        <div class="month-head">
          <div class="month-title">มกราคม <span class="year-sub">2569</span></div>
        </div>
        <div class="weekdays" id="wd-jan"></div>
        <div class="days" id="days-jan"></div>
      </div>
    </div>

    <div id="summary-area" class="summary-section">
      <h2 style="color:#f59e0b; text-align:center;">กำลังโหลดข้อมูล...</h2>
    </div>

    <footer style="margin-top:20px; color:#9ca3af; font-size:12px; text-align:center;">
      ระบบปฏิทินโรงแรมแมวจริงใจ
    </footer>
  </div>

  <div id="popupBox" class="popup-container" onclick="closePopup(event)">
    <div id="popupContent" class="popup"></div>
  </div>
  <div id="formPopupBox" class="popup-container" onclick="closePopup(event)">
    <div id="formPopupContent" class="popup"></div>
  </div>

  <div id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
