<!doctype html>
<html lang="th">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ปฏิทินการจองห้องพัก — สรุปยอดปีใหม่</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png"
    href="https://scontent.fbkk29-4.fna.fbcdn.net/v/t39.30808-6/474231286_122098860398738218_3949646928019992297_n.jpg?_nc_cat=111&ccb=1-7&_nc_sid=6ee11a&_nc_eui2=AeHWuruBIcVSbHqGvl-FhrFFG_vNvcmsu9cb-829yay711roZRh9awOLG69qKvnuBvXwOaMoCOXnPd0izmz2aqgD&_nc_ohc=hrbfaA4z0rMQ7kNvwHECL_S&_nc_oc=Adk7BV8XlQTZcgMpiCJiBhiVZWVB8w8ybNZBDalA9VnJ43vkQTJkr0IwQX9BoB2fa42ZMKtgJt7i9JgqyBQUa7dq&_nc_zt=23&_nc_ht=scontent.fbkk29-4.fna&_nc_gid=8O0fxnEbMpEd9zXk-Dd0gQ&oh=00_AfkovWa2Mxo4j0HKsvfUl3bRz1CyfOzZEWHPXUmk7zCHUA&oe=6940B46D">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <div id="login-container" class="login-form-wrapper" style="display:none;">
    <div class="login-box">
      <h2>เข้าสู่ระบบ ปฏิทินจองห้องพัก</h2>
      <form id="login-form" onsubmit="handleLogin(event)">
        <label for="email">อีเมล (Gmail/อื่นๆ):</label>
        <input type="email" id="email" required placeholder="example@email.com">

        <label for="password">รหัสผ่าน:</label>
        <input type="password" id="password" required placeholder="รหัสผ่าน">

        <button type="submit" class="login-btn">เข้าสู่ระบบ</button>
      </form>
      <p id="auth-message" class="auth-message"></p>
    </div>
  </div>
  <div class="container" id="app-container" style="display:none;">
    <header>
      <div class="header-title-group">
        <div class="logo">
          <img src="https://cdn-icons-png.flaticon.com/512/624/624567.png" alt="JingjaiCatHotel">
        </div>
        <div>
          <h1>ปฏิทินการจองห้องพัก</h1>
          <p class="lead">ธันวาคม 2568 และ มกราคม 2569</p>
        </div>
      </div>
      <div style="display:flex; gap:10px;">
        <button class="add-booking-btn" onclick="showFormPopup()">+ เพิ่มการจองใหม่</button>
        <button class="logout-btn" onclick="handleLogout()">ออกจากระบบ</button>
      </div>
    </header>
    <div class="cal-grid">
      <div class="cal" id="cal-dec">
        <div class="month-head">
          <div>
            <div class="month-title">ธันวาคม <span class="year-sub">2568 (2025)</span></div>
          </div>
        </div>
        <div class="weekdays" id="wd-dec"></div>
        <div class="days" id="days-dec"></div>
      </div>
      <div class="cal" id="cal-jan">
        <div class="month-head">
          <div>
            <div class="month-title">มกราคม <span class="year-sub">2569 (2026)</span></div>
          </div>
        </div>
        <div class="weekdays" id="wd-jan"></div>
        <div class="days" id="days-jan"></div>
      </div>
    </div>
    <div id="summary-area" class="summary-section">
      <h2 style="color:#f59e0b; text-align:center;">กำลังโหลดข้อมูล...</h2>
    </div>
    <footer style="margin-top:20px; color:#9ca3af; font-size:12px; text-align:center;">
      ระบบปฏิทินโรงแรมแมวจริงใจ
    </footer>
  </div>
  <div id="popupBox" class="popup-container" onclick="closePopup(event)">
    <div class="popup" id="popupContent"></div>
  </div>

  <div id="formPopupBox" class="popup-container">
    <div class="popup" id="formPopupContent"></div>
  </div>

  <div id="notificationBox" class="popup-container">
    <div class="popup" id="notificationContent" style="max-width:300px;"></div>
  </div>
  <script src="script.js"></script>
</body>

</html>
