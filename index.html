<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>💪 FitStreak</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body { min-height:100vh; background:#0A0A0F; font-family:'Prompt','Segoe UI',sans-serif; color:#fff; overflow-x:hidden; }

.header { background:linear-gradient(135deg,#1a1a2e,#16213e); padding:16px 20px 0; border-bottom:1px solid #222; position:sticky; top:0; z-index:100; backdrop-filter:blur(12px); }
.header-inner { max-width:480px; margin:0 auto; }
.header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.brand-sub { font-size:10px; color:#555; letter-spacing:3px; }
.brand-name { font-size:22px; font-weight:900; letter-spacing:1px; }
.header-right { display:flex; gap:10px; align-items:center; }
.streak-chip { background:#1a1a2e; border:1px solid #2a2a3e; border-radius:20px; padding:5px 12px; font-size:13px; display:flex; align-items:center; gap:5px; }
.streak-chip-val { font-family:'Bebas Neue',sans-serif; font-size:20px; color:#FF6B35; }
.points-wrap { text-align:right; }
.points-label { font-size:10px; color:#555; letter-spacing:2px; }
.points-val { font-size:24px; font-weight:900; color:#FFE66D; font-family:'Bebas Neue',sans-serif; }
.nav { display:flex; border-radius:12px 12px 0 0; overflow:hidden; }
.nav-btn { flex:1; padding:9px 0; border:none; cursor:pointer; background:transparent; color:#555; font-size:10px; letter-spacing:1px; text-transform:uppercase; font-family:inherit; transition:all .2s; }
.nav-btn.active { background:#0A0A0F; color:#fff; font-weight:700; border-radius:8px 8px 0 0; }

.main { max-width:480px; margin:0 auto; padding:20px 16px 80px; }
.page { display:none; }
.page.active { display:block; }

.stats-row { display:flex; gap:10px; margin-bottom:18px; }
.stat-card-home { flex:1; border-radius:14px; padding:14px 10px; text-align:center; }
.stat-card-home.s-streak { background:linear-gradient(135deg,#FF6B35,#ff8c42); }
.stat-card-home.s-plain { background:#1a1a2e; border:1px solid #2a2a3e; }
.stat-val { font-size:28px; font-weight:900; font-family:'Bebas Neue',sans-serif; }
.stat-lbl { font-size:10px; opacity:.7; letter-spacing:1px; margin-top:2px; }

.today-card { background:#1a1a2e; border:2px solid; border-radius:20px; padding:20px; margin-bottom:14px; position:relative; overflow:hidden; }
.today-bg-emoji { position:absolute; top:-16px; right:-16px; font-size:80px; opacity:.07; pointer-events:none; }
.today-sub { font-size:10px; color:#555; letter-spacing:2px; margin-bottom:4px; }
.today-title { font-size:19px; font-weight:800; margin-bottom:2px; }
.today-meta { font-size:12px; color:#555; margin-bottom:12px; }
.today-progress-wrap { margin-bottom:14px; }
.today-progress-labels { display:flex; justify-content:space-between; font-size:11px; color:#555; margin-bottom:5px; }
.today-progress-bar { background:#111; border-radius:99px; height:5px; overflow:hidden; }
.today-progress-fill { height:100%; border-radius:99px; transition:width .5s; }
.big-btn { width:100%; padding:16px; border-radius:14px; border:none; cursor:pointer; font-size:15px; font-weight:900; font-family:inherit; }
.big-btn:disabled { opacity:.4; cursor:default; }
.big-btn.done-btn { background:#2a2a3e; color:#888; cursor:default; }
.rest-tip { background:#1a1a2e; border-radius:12px; padding:10px 14px; margin-bottom:14px; font-size:11px; color:#666; display:flex; gap:8px; }

.badge-progress { background:#1a1a2e; border-radius:16px; padding:14px 16px; margin-bottom:12px; display:flex; align-items:center; gap:14px; border:1px solid #2a2a3e; }
.badge-emoji-big { font-size:34px; }
.badge-info { flex:1; }
.badge-sub-lbl { font-size:11px; color:#666; }
.badge-title-lbl { font-size:14px; font-weight:700; margin-bottom:6px; }
.badge-bar { background:#111; border-radius:99px; height:5px; overflow:hidden; }
.badge-bar-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,#FF6B35,#FFE66D); transition:width .5s; }
.badge-count-lbl { font-size:10px; color:#555; margin-top:3px; }
.badges-section { background:#1a1a2e; border-radius:16px; padding:14px 16px; border:1px solid #2a2a3e; margin-bottom:14px; }
.section-label { font-size:10px; color:#555; letter-spacing:3px; margin-bottom:10px; }
.badges-grid { display:flex; flex-wrap:wrap; gap:8px; }
.badge-item { background:#111; border-radius:10px; padding:8px 10px; text-align:center; }
.badge-item-emoji { font-size:26px; }
.badge-item-lbl { font-size:10px; color:#666; margin-top:2px; }

.ex-section-title { font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:2px; color:#555; margin:16px 0 10px; }
.exercise-card { background:#1a1a2e; border:1px solid #2a2a3e; border-radius:14px; margin-bottom:10px; overflow:hidden; transition:border-color .2s; }
.exercise-card.active-ex { border-color:#FF6B35; }
.exercise-card.completed-ex { border-color:#4ECDC4; opacity:.75; }
.exercise-header { display:flex; align-items:center; gap:12px; padding:14px; cursor:pointer; }
.ex-num-box { width:30px; height:30px; background:#2a2a3e; border-radius:8px; display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue',sans-serif; font-size:16px; color:#555; flex-shrink:0; transition:all .2s; }
.exercise-card.active-ex .ex-num-box { background:#FF6B35; color:#000; }
.exercise-card.completed-ex .ex-num-box { background:#4ECDC4; color:#000; }
.ex-info { flex:1; }
.ex-name { font-weight:700; font-size:15px; }
.ex-detail { font-size:11px; color:#555; margin-top:2px; }
.ex-arrow { color:#444; font-size:16px; transition:transform .2s; }
.exercise-card.open .ex-arrow { transform:rotate(180deg); }
.sets-panel { display:none; padding:0 14px 14px; }
.exercise-card.open .sets-panel { display:block; }
.sets-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(70px,1fr)); gap:8px; margin-bottom:12px; }
.set-btn { background:#111; border:2px solid #2a2a3e; border-radius:10px; padding:10px 6px; text-align:center; cursor:pointer; transition:all .15s; position:relative; }
.set-btn .set-lbl { font-size:10px; color:#555; }
.set-btn .set-reps { font-family:'Bebas Neue',sans-serif; font-size:20px; color:#ccc; }
.set-btn.done-set { background:rgba(78,205,196,.12); border-color:#4ECDC4; }
.set-btn.done-set .set-reps { color:#4ECDC4; }
.set-btn.active-set { border-color:#FF6B35; background:rgba(255,107,53,.08); }
.set-btn.active-set .set-reps { color:#FF6B35; }
.set-btn .check-icon { position:absolute; top:3px; right:5px; font-size:9px; display:none; color:#4ECDC4; }
.set-btn.done-set .check-icon { display:block; }
.timer-row { display:flex; align-items:center; gap:8px; background:#111; border-radius:10px; padding:10px 12px; font-size:12px; }
.timer-icon { font-size:16px; }
.timer-label { flex:1; color:#555; }
.timer-countdown { font-family:'Bebas Neue',sans-serif; font-size:20px; color:#FF6B35; min-width:44px; text-align:right; }
.timer-countdown.warning { color:#ff4060; }
.start-timer-btn { background:#FF6B35; color:#000; border:none; border-radius:8px; padding:5px 12px; font-family:'Bebas Neue',sans-serif; font-size:14px; cursor:pointer; }

.timer-overlay { display:none; position:fixed; inset:0; z-index:200; background:rgba(0,0,0,.93); flex-direction:column; align-items:center; justify-content:center; gap:20px; }
.timer-overlay.show { display:flex; }
.timer-type-badge { background:#1a1a2e; border:1px solid #2a2a3e; border-radius:20px; padding:6px 16px; font-size:12px; color:#4ECDC4; }
.timer-ring { position:relative; width:200px; height:200px; }
.timer-ring svg { position:absolute; top:0; left:0; transform:rotate(-90deg); }
.timer-ring-inner { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.timer-title-txt { font-family:'Bebas Neue',sans-serif; font-size:14px; letter-spacing:3px; color:#555; }
.timer-big { font-family:'Bebas Neue',sans-serif; font-size:70px; line-height:1; color:#FF6B35; transition:color .3s; }
.timer-big.warning { color:#ff4060; }
.timer-subtitle { font-size:12px; color:#555; text-align:center; padding:0 16px; }
.timer-actions { display:flex; gap:12px; }
.timer-skip-btn { background:#FF6B35; color:#000; border:none; border-radius:12px; padding:12px 28px; font-family:'Bebas Neue',sans-serif; font-size:18px; cursor:pointer; }
.timer-stop-btn { background:#1a1a2e; color:#555; border:1px solid #2a2a3e; border-radius:12px; padding:12px 28px; font-family:'Bebas Neue',sans-serif; font-size:18px; cursor:pointer; }
circle.bg { fill:none; stroke:#222; stroke-width:6; }
circle.fg { fill:none; stroke:#FF6B35; stroke-width:6; stroke-linecap:round; transition:stroke-dashoffset .5s linear,stroke .3s; }
circle.fg.warning { stroke:#ff4060; }

.done-banner { background:linear-gradient(135deg,rgba(78,205,196,.12),rgba(255,230,109,.06)); border:1px solid #4ECDC4; border-radius:16px; padding:20px; text-align:center; margin-bottom:16px; }
.done-banner .done-emoji { font-size:48px; display:block; margin-bottom:8px; }
.done-banner h2 { font-family:'Bebas Neue',sans-serif; font-size:26px; color:#4ECDC4; letter-spacing:2px; }
.done-banner p { font-size:12px; color:#666; margin-top:4px; }

.cal-month { font-family:'Bebas Neue',sans-serif; font-size:20px; margin-bottom:12px; letter-spacing:2px; color:#FF6B35; }
.calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:16px; }
.cal-day-header { text-align:center; font-size:11px; color:#555; padding:4px 0; }
.cal-day { aspect-ratio:1; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; background:#1a1a2e; color:#444; border:1px solid #222; position:relative; }
.cal-day.today { border:2px solid #FF6B35; color:#FF6B35; }
.cal-day.checked { background:rgba(255,107,53,.15); color:#FF6B35; border-color:rgba(255,107,53,.4); }
.cal-day.checked::after { content:'✓'; position:absolute; bottom:2px; right:4px; font-size:9px; color:#FF6B35; }
.cal-day.rest-day { background:rgba(96,96,160,.1); color:#444; }
.cal-day.empty { background:transparent; border-color:transparent; }
.sticker-row { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
.sticker { background:#1a1a2e; border:1px solid #2a2a3e; border-radius:12px; padding:10px 14px; font-size:22px; display:flex; flex-direction:column; align-items:center; min-width:70px; position:relative; }
.sticker.earned { border-color:#4ECDC4; background:rgba(78,205,196,.08); }
.sticker.earned::after { content:'✓'; position:absolute; top:4px; right:6px; font-size:10px; color:#4ECDC4; }
.sticker-label { font-size:10px; color:#555; margin-top:4px; text-align:center; }
.sticker.earned .sticker-label { color:#4ECDC4; }

.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
.stat-card-stats { background:#1a1a2e; border:1px solid #2a2a3e; border-radius:14px; padding:16px; }
.stat-value { font-family:'Bebas Neue',sans-serif; font-size:40px; color:#FF6B35; line-height:1; }
.stat-label-stats { font-size:12px; color:#555; margin-top:4px; }

.schedule-day { margin-bottom:8px; border:1px solid #2a2a3e; border-radius:16px; overflow:hidden; background:#1a1a2e; }
.day-header-row { display:flex; align-items:center; gap:12px; padding:14px 16px; cursor:pointer; }
.day-icon { width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.day-name-txt { font-weight:700; font-size:14px; }
.today-tag { font-size:9px; border-radius:4px; padding:2px 6px; letter-spacing:1px; font-weight:700; color:#000; }
.day-focus-txt { font-size:11px; color:#777; margin-top:1px; }
.day-arrow-sch { font-size:11px; color:#444; margin-left:auto; }
.day-body { padding:0 16px 14px; border-top:1px solid #ffffff08; display:none; }
.day-body.open { display:block; }
.sch-ex-row { display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid #ffffff06; align-items:center; }
.sch-ex-num { font-size:11px; color:#555; margin-right:8px; }
.rest-info-box { margin-top:10px; padding:7px 10px; background:#ffffff07; border-radius:8px; font-size:10px; color:#555; }
.day-note { margin-top:8px; padding:7px 10px; background:rgba(255,107,53,.08); border-radius:8px; font-size:11px; color:#FF6B35; }

/* ── NUTRITION ── */
.nutr-day-banner { border-radius:16px; padding:14px 16px; margin-bottom:16px; display:flex; align-items:center; gap:12px; }
.nutr-day-emoji { font-size:32px; flex-shrink:0; }
.nutr-day-label { font-size:10px; color:rgba(255,255,255,.5); letter-spacing:2px; }
.nutr-day-title { font-size:15px; font-weight:700; }
.nutr-cal-section { background:#1a1a2e; border:1px solid #2a2a3e; border-radius:20px; padding:20px 16px; margin-bottom:12px; }
.nutr-cal-top { display:flex; align-items:center; gap:16px; margin-bottom:16px; }
.nutr-ring-wrap { position:relative; width:100px; height:100px; flex-shrink:0; }
.nutr-ring-wrap svg { transform:rotate(-90deg); }
.nutr-ring-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.nutr-ring-val { font-family:'Bebas Neue',sans-serif; font-size:22px; line-height:1; }
.nutr-ring-unit { font-size:9px; color:#555; letter-spacing:1px; margin-top:2px; }
.nutr-cal-info { flex:1; }
.nutr-cal-eaten { font-family:'Bebas Neue',sans-serif; font-size:38px; line-height:1; }
.nutr-cal-eaten-lbl { font-size:11px; color:#555; margin-bottom:8px; }
.nutr-cal-row { display:flex; gap:6px; flex-wrap:wrap; }
.nutr-cal-chip { background:#111; border-radius:8px; padding:5px 10px; font-size:11px; font-weight:600; border:1px solid #2a2a3e; }
.nutr-cal-chip span { font-family:'Bebas Neue',sans-serif; font-size:15px; }
.nutr-macro-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.nmacro { border-radius:14px; padding:12px 8px; text-align:center; border:1px solid transparent; position:relative; overflow:hidden; background:#111; }
.nmacro-track { position:absolute; bottom:0; left:0; right:0; height:3px; background:#222; }
.nmacro-fill { height:100%; border-radius:99px; transition:width .5s; }
.nmacro-icon { font-size:18px; margin-bottom:4px; }
.nmacro-eaten { font-family:'Bebas Neue',sans-serif; font-size:22px; line-height:1; }
.nmacro-unit { font-size:9px; color:#555; }
.nmacro-goal { font-size:10px; color:#444; margin-top:3px; }
.nmacro-rem { font-size:10px; margin-top:4px; font-weight:700; }
.nmacro.done { border-color:rgba(78,205,196,.3); }
.nutr-water-card { background:#1a1a2e; border:1px solid #2a2a3e; border-radius:16px; padding:14px 16px; margin-top:12px; margin-bottom:16px; display:flex; align-items:center; gap:12px; }
.nutr-water-left { flex:1; }
.nutr-water-title { font-size:13px; font-weight:700; margin-bottom:4px; }
.nutr-water-bar-wrap { background:#111; border-radius:99px; height:8px; overflow:hidden; margin-top:8px; }
.nutr-water-bar-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,#74b9ff,#0984e3); transition:width .5s; }
.nutr-water-btns { display:flex; flex-direction:column; gap:5px; }
.nutr-water-btn { background:#74b9ff22; border:1px solid #74b9ff44; border-radius:10px; padding:6px 12px; color:#74b9ff; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; white-space:nowrap; }
.nutr-water-reset { font-size:10px; color:#444; background:none; border:none; cursor:pointer; font-family:inherit; margin-top:4px; text-align:center; }
.nutr-log-card { background:#1a1a2e; border:1px solid #2a2a3e; border-radius:20px; padding:16px; margin-bottom:16px; }
.nutr-log-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.nutr-log-title { font-size:14px; font-weight:700; }
.nutr-log-clear { background:none; border:1px solid #2a2a3e; border-radius:8px; padding:4px 10px; color:#666; font-size:11px; cursor:pointer; font-family:inherit; }
.nutr-log-item { display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid #ffffff06; }
.nutr-log-item:last-of-type { border-bottom:none; }
.nutr-log-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.nutr-log-name { flex:1; font-size:13px; }
.nutr-log-kcal { font-family:'Bebas Neue',sans-serif; font-size:17px; color:#FF6B35; }
.nutr-log-del { background:none; border:none; color:#333; cursor:pointer; font-size:16px; padding:0 4px; }
.nutr-log-empty { color:#444; font-size:12px; text-align:center; padding:14px 0; }
.nutr-add-row { display:flex; gap:6px; margin-top:10px; width:100%; overflow:hidden; }
.nutr-add-select { flex:1; min-width:0; background:#111; border:1px solid #2a2a3e; border-radius:10px; padding:9px 10px; color:#fff; font-size:12px; font-family:inherit; outline:none; overflow:hidden; text-overflow:ellipsis; }
.nutr-add-btn { flex:0 0 auto; background:#FF6B35; color:#000; border:none; border-radius:10px; padding:9px 14px; font-weight:900; font-size:13px; cursor:pointer; font-family:inherit; white-space:nowrap; }

/* ── API KEY + LIMIT GUARD ── */
.api-key-card { background:#1a1a2e; border:1px solid #FF6B3544; border-radius:16px; padding:14px 16px; margin-bottom:14px; }
.api-key-card.has-key { border-color:#4ECDC444; }
.api-key-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.api-key-title { font-size:13px; font-weight:700; }
.api-key-status { font-size:11px; padding:3px 10px; border-radius:20px; font-weight:700; }
.api-key-status.ok { background:rgba(78,205,196,.15); color:#4ECDC4; }
.api-key-status.missing { background:rgba(255,107,53,.15); color:#FF6B35; }
.api-key-row { display:flex; gap:6px; }
.api-key-input { flex:1; min-width:0; background:#111; border:1px solid #2a2a3e; border-radius:10px; padding:9px 12px; color:#fff; font-size:12px; font-family:inherit; outline:none; letter-spacing:1px; }
.api-key-input:focus { border-color:#FF6B35; }
.api-key-save { flex:0 0 auto; background:#FF6B35; color:#000; border:none; border-radius:10px; padding:9px 14px; font-weight:900; font-size:13px; cursor:pointer; font-family:inherit; }
.api-key-clear { font-size:11px; color:#555; background:none; border:none; cursor:pointer; font-family:inherit; margin-top:6px; text-decoration:underline; }
.api-key-hint { font-size:10px; color:#555; margin-top:6px; line-height:1.5; }

/* ── LIMIT BAR ── */
.limit-bar-wrap { margin-top:10px; }
.limit-bar-row { display:flex; justify-content:space-between; font-size:10px; margin-bottom:4px; }
.limit-bar-lbl { color:#555; }
.limit-bar-val { font-weight:700; }
.limit-bar-track { background:#111; border-radius:99px; height:6px; overflow:hidden; }
.limit-bar-fill { height:100%; border-radius:99px; transition:width .4s; }
.limit-warning { background:rgba(255,230,109,.08); border:1px solid #FFE66D44; border-radius:10px; padding:8px 12px; margin-top:8px; font-size:11px; color:#FFE66D; }
.limit-blocked { background:rgba(255,64,96,.1); border:1px solid rgba(255,64,96,.3); border-radius:10px; padding:10px 12px; margin-top:8px; font-size:12px; color:#ff8a9a; text-align:center; }
.limit-blocked b { display:block; font-size:14px; margin-bottom:4px; }

/* ── MEAL CARDS ── */
.meal-section-title { font-family:'Bebas Neue',sans-serif; font-size:14px; letter-spacing:2px; color:#555; margin:16px 0 8px; }
.meal-cat-tabs { display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; margin-bottom:10px; padding-bottom:2px; }
.meal-cat-tabs::-webkit-scrollbar { display:none; }
.meal-cat-btn { flex:0 0 auto; background:#1a1a2e; border:1px solid #2a2a3e; border-radius:20px; padding:6px 14px; font-size:12px; color:#555; cursor:pointer; font-family:inherit; white-space:nowrap; transition:all .2s; }
.meal-cat-btn.active { background:rgba(255,107,53,.12); border-color:#FF6B3566; color:#FF6B35; font-weight:700; }
.meal-cards-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
.meal-card { background:#1a1a2e; border:1px solid #2a2a3e; border-radius:14px; padding:12px; cursor:pointer; transition:all .15s; display:flex; flex-direction:column; gap:3px; position:relative; overflow:hidden; }
.meal-card:active { transform:scale(.97); opacity:.9; }
.meal-card.water-card { border-color:#74b9ff33; background:rgba(116,185,255,.05); }
.meal-card-emoji { font-size:22px; line-height:1; }

function streak(){
  let count=0;const d=new Date();
  while(true){
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if(state.checkins[k]&&state.checkins[k].done){count++;d.setDate(d.getDate()-1);}else break;
  }return count;
}

function unlockAudio(){if(window._audioCtx)return;try{window._audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch{}}
document.addEventListener('touchstart',unlockAudio,{once:true});

function beep(beeps){
  try{
    const ctx=window._audioCtx||(window._audioCtx=new(window.AudioContext||window.webkitAudioContext)());
    if(ctx.state==='suspended')ctx.resume();
    beeps.forEach(b=>{
      const osc=ctx.createOscillator(),gain=ctx.createGain(),now=ctx.currentTime;
      osc.connect(gain);gain.connect(ctx.destination);
      osc.type=b.type||'sine';osc.frequency.value=b.freq;
      gain.gain.setValueAtTime(0,now+b.start);
      gain.gain.linearRampToValueAtTime(b.vol||0.7,now+b.start+0.01);
      gain.gain.linearRampToValueAtTime(0,now+b.start+b.dur);
      osc.start(now+b.start);osc.stop(now+b.start+b.dur+0.05);
    });
  }catch(e){}
}
function playAlertSound(){beep([{freq:1046,start:0,dur:.18,vol:.8},{freq:1318,start:.22,dur:.18,vol:.8},{freq:1568,start:.44,dur:.35,vol:.9}]);if(navigator.vibrate)navigator.vibrate([150,80,150,80,300]);}
function playSetDoneSound(){beep([{freq:880,start:0,dur:.1,vol:.5},{freq:1100,start:.13,dur:.18,vol:.65}]);if(navigator.vibrate)navigator.vibrate([60,40,80]);}

let timer={id:null,seconds:0,total:0,onDone:null,type:'',label:'',startWallTime:null};
function startTimerOverlay(seconds,type,subtitle,onDone){
  if(timer.id)clearInterval(timer.id);
  timer={id:null,seconds,total:seconds,onDone,type,label:subtitle,startWallTime:Date.now()};
  localStorage.setItem('activeTimer',JSON.stringify({startWallTime:Date.now(),total:seconds,type,subtitle}));
  document.getElementById('timerTypeBadge').textContent=type;
  document.getElementById('timerTitle').textContent=type;
  document.getElementById('timerSub').textContent=subtitle;
  document.getElementById('timerOverlay').classList.add('show');
  updateTimerDisplay();
  timer.id=setInterval(timerTick,500);
}
function timerTick(){
  const elapsed=Math.floor((Date.now()-timer.startWallTime)/1000);
  timer.seconds=Math.max(0,timer.total-elapsed);
  updateTimerDisplay();
  if(timer.seconds<=0){
    clearInterval(timer.id);timer.id=null;
    localStorage.removeItem('activeTimer');
    document.getElementById('timerOverlay').classList.remove('show');
    vibrate();playAlertSound();showToast('⏰ หมดเวลาพัก — เริ่มได้เลย!');
    if(timer.onDone)timer.onDone();
  }
}
function updateTimerDisplay(){
  const s=timer.seconds,big=document.getElementById('timerBig'),circle=document.getElementById('timerCircle');
  big.textContent=fmt(s);const warn=s<=10;
  big.classList.toggle('warning',warn);circle.classList.toggle('warning',warn);
  circle.style.strokeDashoffset=(2*Math.PI*88)*(1-timer.seconds/timer.total);
}
function stopTimer(){if(timer.id)clearInterval(timer.id);timer.id=null;localStorage.removeItem('activeTimer');document.getElementById('timerOverlay').classList.remove('show');}
function skipTimer(){stopTimer();}
function startSetTimer(exIdx){startTimerOverlay(TIMER_SET,'พักระหว่างเซต',`เซต ${exIdx+1} — พักให้หายใจ`,()=>{});}

function buildExerciseList(sched,checkin){
  const setsInfo=checkin.sets||{};let html=`<div class="ex-section-title">ท่าออกกำลังกายวันนี้</div>`;

    for(let s=0;s<ex.sets;s++){const done=doneArr[s],isNext=!done&&(s===0||doneArr[s-1]);html+=`<div class="set-btn ${done?'done-set':(isNext?'active-set':'')}" onclick="toggleSet(${i},${s})"><span class="check-icon">✓</span><div class="set-lbl">เซต ${s+1}</div><div class="set-reps">${ex.reps}</div></div>`;}

  });return html;
}
function toggleExCard(i){document.getElementById(`exCard${i}`).classList.toggle('open');}
function toggleSet(exIdx,setIdx){
  const key=todayKeyFn(),checkin=getCheckin(key),sched=getSchedule(),ex=sched.exercises[exIdx];
  if(!checkin.sets[exIdx])checkin.sets[exIdx]=new Array(ex.sets).fill(false);
  const wasTrue=checkin.sets[exIdx][setIdx];checkin.sets[exIdx][setIdx]=!wasTrue;
  if(!wasTrue){
    checkin.points=(checkin.points||0)+5;state.totalPoints=(state.totalPoints||0)+5;showPointsPop('+5');playSetDoneSound();
    const allSetsDone=checkin.sets[exIdx].every(Boolean);
    if(allSetsDone){
      const allExDone=sched.exercises.every((e,i)=>(checkin.sets[i]||[]).filter(Boolean).length>=e.sets);
      if(allExDone){checkin.points+=20;state.totalPoints+=20;checkin.done=true;saveState();updateUI();setTimeout(()=>{launchConfetti();showToast('🏆 ทำครบแล้ว! +20 แต้มโบนัส');showCelebration(checkin.points,'done');},300);return;}

    }else{saveState();updateUI();setTimeout(()=>startSetTimerAuto(),100);return;}
  }saveState();updateUI();
}

function getTodayGoals(){return NUTR_GOALS[SCHEDULE[todayDow()].dayType]||NUTR_GOALS['A'];}
function getFoodLog(){const k=todayKeyFn();if(!state.foodLog[k])state.foodLog[k]=[];return state.foodLog[k];}
function getWaterMl(){const k=todayKeyFn();return state.waterLog[k]||0;}
function addWaterMl(ml){const k=todayKeyFn();state.waterLog[k]=(state.waterLog[k]||0)+ml;saveState();renderNutrition();const total=state.waterLog[k];if(total>=WATER_GOAL_ML)showToast('💧 ดื่มน้ำครบเป้าวันนี้! 🎉');else showToast(`💧 +${ml}ml — รวม ${total}ml วันนี้`);}
function resetWater(){state.waterLog[todayKeyFn()]=0;saveState();renderNutrition();}
function getEaten(){const log=getFoodLog();return{cal:log.reduce((a,f)=>a+(f.calories||0),0),protein:log.reduce((a,f)=>a+(f.protein||0),0),fat:log.reduce((a,f)=>a+(f.fat||0),0),carb:log.reduce((a,f)=>a+(f.carbs||0),0)};}

function macroCard(icon,label,eaten,goal,unit,color){
  const pct=Math.min(Math.round((eaten/goal)*100),100),rem=goal-eaten,done=eaten>=goal;
  return`<div class="nmacro${done?' done':''}" style="${done?`border-color:${color}44`:''}"><div class="nmacro-icon">${icon}</div><div class="nmacro-eaten" style="color:${done?color:'#ccc'}">${eaten}</div><div class="nmacro-unit">${unit}</div><div class="nmacro-goal">/ ${goal}${unit}</div><div class="nmacro-rem" style="color:${done?color:rem<goal*0.2?'#FFE66D':'#555'}">${done?'✅ ครบ':rem+unit+' เหลือ'}</div><div class="nmacro-track"><div class="nmacro-fill" style="width:${pct}%;background:${color}"></div></div></div>`;
}
function addFoodFromSelect(){const sel=document.getElementById('foodSelect');if(!sel||sel.value==='')return;const meal=MY_MEALS[parseInt(sel.value)];if(meal.isWater){addWaterMl(meal.waterMl||600);return;}const k=todayKeyFn();if(!state.foodLog[k])state.foodLog[k]=[];state.foodLog[k].push({food:meal.food,calories:meal.calories,protein:meal.protein,fat:meal.fat,carbs:meal.carbs});saveState();showToast(`✅ เพิ่ม ${meal.food} แล้ว`);renderNutrition();}
function addCurrentMealToLog(){if(!currentNutrResult)return;const m=currentNutrResult;if(m.isWater){addWaterMl(m.waterMl||600);return;}const k=todayKeyFn();if(!state.foodLog[k])state.foodLog[k]=[];state.foodLog[k].push({food:m.food,calories:m.calories,protein:m.protein,fat:m.fat,carbs:m.carbs});saveState();showToast(`✅ เพิ่ม ${m.food} ลงบันทึกแล้ว`);renderNutrition();}
function removeFoodLog(idx){const k=todayKeyFn();if(!state.foodLog[k])return;state.foodLog[k].splice(idx,1);saveState();renderNutrition();}
function clearFoodLog(){state.foodLog[todayKeyFn()]=[];saveState();renderNutrition();}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// API KEY + DAILY LIMIT GUARD
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const OR_DAILY_LIMIT = 180; // safe buffer below 200 free req/day

// Usage tracking — keyed by UTC date → auto-resets at midnight UTC
function _usageKey(){return 'fs_or_usage_'+new Date().toISOString().slice(0,10);}
function getUsage(){
  // Clean old keys to keep localStorage tidy
  Object.keys(localStorage).filter(k=>k.startsWith('fs_or_usage_')&&k!==_usageKey()).forEach(k=>localStorage.removeItem(k));
  return parseInt(localStorage.getItem(_usageKey())||'0',10);
}
function incUsage(){const k=_usageKey();localStorage.setItem(k,String(getUsage()+1));}
function usageRemaining(){return Math.max(0,OR_DAILY_LIMIT-getUsage());}
function isLimitReached(){return getUsage()>=OR_DAILY_LIMIT;}
function usageResetTime(){
  const now=new Date();
  const next=new Date(Date.UTC(now.getUTCFullYear(),now.getUTCMonth(),now.getUTCDate()+1));
  const diff=next-now;
  const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000);
  return`${h} ชม. ${m} นาที`;
}
function usagePct(){return Math.min(Math.round((getUsage()/OR_DAILY_LIMIT)*100),100);}
function usageBarColor(){const p=usagePct();return p>=100?'#ff4060':p>=80?'#FFE66D':'#4ECDC4';}

function getApiKey(){return localStorage.getItem('fs_openrouter_key')||'';}
function saveApiKey(){
  const v=document.getElementById('apiKeyInput').value.trim();
  if(!v){showToast('❌ กรุณาใส่ API Key');return;}
  if(!v.startsWith('sk-or-')){showToast('❌ Key ต้องขึ้นต้นด้วย sk-or-');return;}
  localStorage.setItem('fs_openrouter_key',v);showToast('✅ บันทึก API Key แล้ว');renderNutrition();
}
function clearApiKey(){localStorage.removeItem('fs_openrouter_key');renderNutrition();showToast('🗑 ลบ API Key แล้ว');}

function renderApiKeyCard(){
  const key=getApiKey(),used=getUsage(),rem=usageRemaining(),pct=usagePct(),barColor=usageBarColor(),limited=isLimitReached();
  const masked=key?'sk-or-···'+key.slice(-6):'';
  if(!key){
    return`<div class="api-key-card">
      <div class="api-key-top"><span class="api-key-title">🔑 OpenRouter API Key</span><span class="api-key-status missing">ยังไม่ได้ตั้ง</span></div>
      <div class="api-key-row"><input class="api-key-input" id="apiKeyInput" type="password" placeholder="sk-or-v1-..."/><button class="api-key-save" onclick="saveApiKey()">บันทึก</button></div>
      <div class="api-key-hint">✅ ฟรี 200 req/วัน ไม่ต้องใส่บัตรเครดิต<br>1. ไปที่ <b>openrouter.ai</b> → Sign Up (ใช้ Gmail ได้)<br>2. ไปที่ <b>Keys</b> → Create Key<br>3. Copy key ที่ขึ้นต้น <b>sk-or-</b> มาใส่ที่นี่</div>
    </div>`;
  }
  return`<div class="api-key-card has-key">
    <div class="api-key-top"><span class="api-key-title">🔑 OpenRouter</span><span class="api-key-status ok">✓ พร้อมใช้</span></div>
    <div style="font-size:11px;color:#555;margin-bottom:8px">${masked}</div>
    <div class="limit-bar-wrap">
      <div class="limit-bar-row">
        <span class="limit-bar-lbl">📊 ใช้ไปวันนี้ (รีเซ็ตทุก 00:00 UTC)</span>
        <span class="limit-bar-val" style="color:${barColor}">${used} / ${OR_DAILY_LIMIT}</span>
      </div>
      <div class="limit-bar-track"><div class="limit-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
    </div>
    ${pct>=80&&!limited?`<div class="limit-warning">⚠️ ใกล้ถึง limit แล้ว เหลือ ${rem} req · รีเซ็ตในอีก ${usageResetTime()}</div>`:''}
    ${limited?`<div class="limit-blocked"><b>🚫 ถึง limit วันนี้แล้ว (${OR_DAILY_LIMIT}/${OR_DAILY_LIMIT})</b>จะรีเซ็ตในอีก ${usageResetTime()} · หรือ <a href="https://openrouter.ai/credits" target="_blank" style="color:#74b9ff">เติมเครดิต</a></div>`:''}
    <button class="api-key-clear" onclick="clearApiKey()">เปลี่ยน / ลบ Key</button>
  </div>`;
}

// ── OpenRouter caller with model fallback ──
const OR_MODELS = [
  'meta-llama/llama-3.3-70b-instruct:free',
  'mistralai/mistral-7b-instruct:free',
  'google/gemma-3-12b-it:free',
  'openrouter/auto',
];
async function callOpenRouter(apiKey,prompt,maxTokens=600){
  for(let m=0;m<OR_MODELS.length;m++){
    for(let retry=0;retry<2;retry++){
      try{
        const res=await fetch('https://openrouter.ai/api/v1/chat/completions',{
          method:'POST',
          headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`,'HTTP-Referer':'https://fitstreak.app','X-Title':'FitStreak'},
          body:JSON.stringify({model:OR_MODELS[m],messages:[{role:'user',content:prompt}],temperature:0.2,max_tokens:maxTokens})
        });
        if(res.status===429){if(retry===0){await new Promise(r=>setTimeout(r,2000));continue;}else break;}
        const data=await res.json();
        if(data.error)throw new Error(data.error.message||'OpenRouter error');
        const raw=(data.choices?.[0]?.message?.content||'').replace(/```json|```/g,'').trim();
        if(!raw)throw new Error('ไม่ได้รับข้อมูล');
        return raw;
      }catch(e){if(retry===1&&m===OR_MODELS.length-1)throw e;if(retry===1)break;}
    }
  }
  throw new Error('ทุก model เต็มในขณะนี้ ลองใหม่ในอีกสักครู่');
}

function quickAsk(text){document.getElementById('nutrInput').value=text;askNutrition();}
async function askNutrition(){
  const apiKey=getApiKey();
  if(!apiKey){showToast('❌ ใส่ OpenRouter Key ก่อน');renderNutrition();return;}
  if(isLimitReached()){showToast(`🚫 ถึง limit วันนี้แล้ว รีเซ็ตในอีก ${usageResetTime()}`);return;}
  const input=document.getElementById('nutrInput'),btn=document.getElementById('nutrAskBtn');
  const query=input.value.trim();if(!query)return;
  const resultEl=document.getElementById('nutrResult');
  btn.disabled=true;btn.textContent='⏳';
  resultEl.innerHTML=`<div class="nutr-loading"><span class="nutr-loading-spinner">⚙️</span>กำลังวิเคราะห์... (เหลือ ${usageRemaining()-1} req วันนี้)</div>`;
  const prompt=`คุณคือผู้เชี่ยวชาญด้านโภชนาการ วิเคราะห์สารอาหารของ: "${query}"
ตอบเป็น JSON เท่านั้น ไม่มีข้อความอื่น:
{"food":"ชื่ออาหาร","serving":"ขนาด","calories":0,"protein":0.0,"fat":0.0,"carbs":0.0,"fiber":0.0,"sugar":0.0,"note":"หมายเหตุ 1-2 ประโยคภาษาไทย"}`;
  try{
    const raw=await callOpenRouter(apiKey,prompt,600);
    incUsage(); // นับหลังสำเร็จ
    const info=JSON.parse(raw);
    currentNutrResult=info;displayNutrResult(info);
    nutrQueryHistory.unshift(info);if(nutrQueryHistory.length>10)nutrQueryHistory.pop();
    renderNutrHistory();input.value='';
    // อัปเดต counter ในการ์ด
    const card=document.querySelector('.api-key-card.has-key');
    if(card)card.outerHTML=renderApiKeyCard();
  }catch(e){
    const msg=e.message||'';
    const isAuth=msg.includes('401')||msg.includes('403')||msg.includes('Invalid');
    resultEl.innerHTML=`<div class="nutr-error">❌ ${isAuth?'API Key ไม่ถูกต้อง — ตรวจสอบที่ openrouter.ai/keys':msg||'เกิดข้อผิดพลาด ลองใหม่'}</div>`;
  }
  btn.disabled=false;btn.textContent='ถาม AI';
}
function showMealInfo(idx){
  currentNutrResult=MY_MEALS[idx];displayNutrResult(MY_MEALS[idx]);
  nutrQueryHistory.unshift(MY_MEALS[idx]);if(nutrQueryHistory.length>10)nutrQueryHistory.pop();
  renderNutrHistory();setTimeout(()=>document.getElementById('nutrResult').scrollIntoView({behavior:'smooth',block:'nearest'}),100);
}

  const el=document.getElementById('nutrResult');if(!el)return;
  const goals=getTodayGoals();
  const pctCal=Math.min(Math.round((info.calories/goals.cal)*100),999);
  const pctP=Math.min(Math.round(((info.protein||0)/goals.protein)*100),999);
  const pctF=Math.min(Math.round(((info.fat||0)/goals.fat)*100),999);
  const pctC=Math.min(Math.round(((info.carbs||0)/goals.carb)*100),999);
  const isW=info.isWater;
  el.innerHTML=`<div class="nutr-result-card"><div class="nutr-result-food">${isW?'💧':'🍽️'} ${info.food} <span style="font-size:11px;color:#555;font-weight:400">(${info.serving||''})</span></div>
  ${isW?`<div style="text-align:center;padding:20px"><div style="font-family:'Bebas Neue',sans-serif;font-size:48px;color:#74b9ff">${info.waterMl}ml</div><div style="font-size:12px;color:#555">ไม่มีแคลอรี่ — นับยอดน้ำ</div></div>`
  :`<div class="nutr-result-grid"><div class="nutr-result-item"><div class="nutr-result-label">🔥 แคลอรี่</div><div class="nutr-result-val" style="color:#FF6B35">${info.calories} <span style="font-size:13px">kcal</span></div></div><div class="nutr-result-item"><div class="nutr-result-label">🥩 โปรตีน</div><div class="nutr-result-val" style="color:#4ECDC4">${info.protein} <span style="font-size:13px">g</span></div></div><div class="nutr-result-item"><div class="nutr-result-label">🥑 ไขมัน</div><div class="nutr-result-val" style="color:#FFE66D">${info.fat} <span style="font-size:13px">g</span></div></div><div class="nutr-result-item"><div class="nutr-result-label">🍚 คาร์บ</div><div class="nutr-result-val" style="color:#A8E6CF">${info.carbs} <span style="font-size:13px">g</span></div></div><div class="nutr-result-item"><div class="nutr-result-label">🌾 ไฟเบอร์</div><div class="nutr-result-val" style="color:#C3A6FF">${info.fiber||0} <span style="font-size:13px">g</span></div></div><div class="nutr-result-item"><div class="nutr-result-label">🍬 น้ำตาล</div><div class="nutr-result-val" style="color:#F38181">${info.sugar||0} <span style="font-size:13px">g</span></div></div></div>
  <div class="nutr-result-note">${info.note||''}</div>

// MEAL PLANNER

let plannerState={mealCount:3,style:'อาหารตามสั่ง',result:null,loading:false};
function renderPlanner(){

  <div class="planner-options-card"><div class="planner-opt-title">จำนวนมื้อ</div><div class="planner-meals-row"><button class="planner-meal-btn ${plannerState.mealCount===2?'active':''}" onclick="setPlannerOpt('mealCount',2)">2 มื้อ</button><button class="planner-meal-btn ${plannerState.mealCount===3?'active':''}" onclick="setPlannerOpt('mealCount',3)">3 มื้อ</button></div><div class="planner-opt-title">สไตล์อาหาร</div><div class="planner-style-row">${styles.map(s=>`<button class="planner-style-btn ${plannerState.style===s?'active':''}" onclick="setPlannerOpt('style','${s}')">${s}</button>`).join('')}</div></div>`;
  if(!apiKey){h+=`<div class="planner-plan-card" style="padding:16px;text-align:center"><div style="font-size:32px;margin-bottom:8px">🔑</div><div style="font-size:14px;font-weight:700;margin-bottom:6px">ต้องมี OpenRouter API Key</div><div style="font-size:12px;color:#555">ไปที่แท็บ 🥗 โภชนา แล้วใส่ Key ก่อน</div></div>`;}
  else if(isLimitReached()){h+=`<div class="planner-error">🚫 ถึง limit วันนี้แล้ว (${getUsage()}/${OR_DAILY_LIMIT})<br><small>รีเซ็ตในอีก ${usageResetTime()}</small></div>`;}
  else{h+=`<button class="planner-gen-btn" style="background:linear-gradient(135deg,${color},${color}bb)" onclick="generateMealPlan()">✨ แนะนำเมนูให้เลย</button>`;}
  h+=`<div class="planner-result-wrap" id="plannerResult">`;
  if(plannerState.loading){h+=`<div class="planner-loading"><span class="planner-loading-icon">🍽️</span><div style="font-size:14px">กำลังวางแผนมื้ออาหาร...</div><div style="font-size:11px;margin-top:6px;color:#444">คำนวณตามเป้าโภชนาการของวัน${sched.name}</div></div>`;}
  else if(plannerState.result){
    const plan=plannerState.result;const times=mealTimes[plannerState.mealCount]||mealTimes[3];
    let tCal=0,tP=0,tF=0,tC=0;
    plan.meals.forEach((meal,mi)=>{
      const mCal=meal.items.reduce((a,it)=>a+(it.calories||0),0),mP=meal.items.reduce((a,it)=>a+(it.protein||0),0),mF=meal.items.reduce((a,it)=>a+(it.fat||0),0),mC=meal.items.reduce((a,it)=>a+(it.carbs||0),0);
      tCal+=mCal;tP+=mP;tF+=mF;tC+=mC;
      h+=`<div class="planner-plan-card"><div class="planner-plan-header" style="background:${color}10"><div class="planner-plan-icon">${meal.icon||'🍽️'}</div><div><div class="planner-plan-meal-name">${meal.name}</div><div class="planner-plan-time">${times[mi]||''} · ${mCal} kcal · P${mP}g</div></div></div><div class="planner-meal-items">`;
      meal.items.forEach(item=>{h+=`<div class="planner-meal-item"><div class="planner-item-emoji">${item.emoji||'🍽️'}</div><div class="planner-item-info"><div class="planner-item-name">${item.name}</div><div class="planner-item-note">${item.note||''}</div></div><div class="planner-item-kcal">${item.calories}</div></div>`;});
      h+=`</div><div class="planner-macros-row" style="padding:0 16px 12px"><span class="planner-macro-chip" style="color:#FF6B35">🔥 ${mCal} kcal</span><span class="planner-macro-chip" style="color:#4ECDC4">P ${mP}g</span><span class="planner-macro-chip" style="color:#FFE66D">F ${mF}g</span><span class="planner-macro-chip" style="color:#A8E6CF">C ${mC}g</span></div><div style="padding:0 16px 14px"><button class="planner-add-row-btn" onclick="addPlanMealToLog(${mi})">+ บันทึกมื้อนี้ลงรายการวันนี้</button></div></div>`;
    });

    h+=`<button class="planner-regen-btn" onclick="generateMealPlan()">🔄 แนะนำแผนใหม่อีกครั้ง</button>`;
  }
  h+=`</div>`;el.innerHTML=h;
}
function setPlannerOpt(key,val){plannerState[key]=val;plannerState.result=null;renderPlanner();}
async function generateMealPlan(){
  const apiKey=getApiKey();if(!apiKey){showToast('❌ ใส่ OpenRouter Key ก่อน');return;}
  if(isLimitReached()){showToast(`🚫 ถึง limit แล้ว รีเซ็ตในอีก ${usageResetTime()}`);return;}
  const sched=SCHEDULE[todayDow()],goals=getTodayGoals(),eaten=getEaten();
  const remaining={cal:Math.max(0,goals.cal-eaten.cal),protein:Math.max(0,goals.protein-eaten.protein),fat:Math.max(0,goals.fat-eaten.fat),carb:Math.max(0,goals.carb-eaten.carb)};
  const useRem=eaten.cal>50;
  plannerState.loading=true;plannerState.result=null;renderPlanner();
  const mealNames=plannerState.mealCount===2?['มื้อกลางวัน (12:00)','มื้อเย็น (20:00-21:00 หลังออกกำลังกาย)']:['มื้อเช้า-กลางวัน (11:00)','มื้อบ่าย (16:00)','มื้อเย็น (20:00-21:00 หลังออกกำลังกาย)'];
  const prompt=`คุณคือนักโภชนาการผู้เชี่ยวชาญด้านอาหารไทย\nวางแผนมื้ออาหาร ${plannerState.mealCount} มื้อสำหรับวัน${sched.name} (${goals.label})\n\nเป้าหมาย${useRem?'ที่เหลือ':''}วันนี้: แคลอรี่ ${useRem?remaining.cal:goals.cal} kcal, โปรตีน ${useRem?remaining.protein:goals.protein}g, ไขมัน ${useRem?remaining.fat:goals.fat}g, คาร์บ ${useRem?remaining.carb:goals.carb}g\n\nเงื่อนไข: สไตล์${plannerState.style}, ออกกำลังกาย 4-5 ทุ่ม, มื้อเย็นโปรตีนสูง, มื้อ: ${mealNames.join(' | ')}\n\nตอบเป็น JSON เท่านั้น:\n{"meals":[{"name":"ชื่อมื้อ","icon":"emoji","items":[{"name":"ชื่ออาหาร+ขนาด","emoji":"emoji","calories":0,"protein":0,"fat":0,"carbs":0,"note":"เหตุผล"}]}],"tip":"เคล็ดลับ 1-2 ประโยค"}`;
  try{
    const raw=await callOpenRouter(apiKey,prompt,1800);
    incUsage(); // นับหลังสำเร็จ
    plannerState.result=JSON.parse(raw);plannerState.loading=false;renderPlanner();showToast('✅ แผนมื้ออาหารพร้อมแล้ว!');
  }catch(e){
    plannerState.loading=false;plannerState.result=null;renderPlanner();
    const el=document.getElementById('plannerResult');
    if(el){const pm=e.message||'';el.innerHTML=`<div class="planner-error">❌ ${pm||'เกิดข้อผิดพลาด กรุณาลองใหม่'}</div>`;}
  }
}
function addPlanMealToLog(mealIdx){
  if(!plannerState.result)return;const meal=plannerState.result.meals[mealIdx];if(!meal)return;
  const k=todayKeyFn();if(!state.foodLog[k])state.foodLog[k]=[];
  meal.items.forEach(item=>state.foodLog[k].push({food:item.name,calories:item.calories||0,protein:item.protein||0,fat:item.fat||0,carbs:item.carbs||0}));
  saveState();showToast(`✅ บันทึก ${meal.name} แล้ว (${meal.items.length} รายการ)`);
}

async function sendCoachMessage(){

  const input=document.getElementById('coachInput');
  const text=(input?input.value:'').trim();
  if(!text)return;
  if(input)input.value='';

  const now=new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
  coachMessages.push({role:'user',text,time:now});
  coachTyping=true;
  renderCoach();

  // Build conversation history for context (last 6 messages)
  const history=coachMessages.slice(-7,-1).map(m=>({role:m.role==='user'?'user':'assistant',content:m.role==='user'?m.text:(m.text+(m.cards?.length?'\n[had exercise cards]':''))}));
  const fullPrompt=COACH_SYSTEM_PROMPT+'\n\n---\n'+history.map(h=>`${h.role==='user'?'User':'AI'}: ${h.content}`).join('\n')+`\nUser: ${text}\nAI:`;

  try{
    const raw=await callOpenRouter(apiKey,fullPrompt,900);
    incUsage();

    // Parse exercise cards
    const cards=[];
    let displayText=raw;

    if(raw.includes('[EXERCISE_CARD]')){
      const parts=raw.split('[EXERCISE_CARD]');
      displayText=parts[0].trim();
      for(let i=1;i<parts.length;i++){
        const part=parts[i].trim();
        const jsonMatch=part.match(/\{[\s\S]*?\}/);
        if(jsonMatch){
          try{cards.push(JSON.parse(jsonMatch[0]));}catch{}
          const after=part.replace(jsonMatch[0],'').trim();
          if(after)displayText+=(displayText?'\n':'')+after;
        }
      }
    }

    coachMessages.push({role:'ai',text:displayText||'',cards,time:new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})});
  }catch(e){
    coachMessages.push({role:'ai',text:`❌ ${e.message||'เกิดข้อผิดพลาด กรุณาลองใหม่'}`,cards:[],time:new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})});
  }
  coachTyping=false;
  renderCoach();
}

function addExerciseToToday(name,sets){
  // แจ้งเตือนและเปิด tab today
  showToast(`💪 เพิ่ม "${name}" — ดูรายละเอียดที่ตาราง`);
}

function clearCoachHistory(){
  coachMessages=[];
  renderCoach();
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function showPointsPop(text){const el=document.createElement('div');el.className='points-pop';el.textContent=text;el.style.left=(Math.random()*60+20)+'%';el.style.top='40%';document.body.appendChild(el);setTimeout(()=>el.remove(),1100);}
function launchConfetti(){const colors=['#FF6B35','#FFE66D','#4ECDC4','#fff','#A8E6CF','#ff4060'];for(let i=0;i<40;i++){const el=document.createElement('div');el.className='confetti-piece';el.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*30}%;background:${colors[Math.floor(Math.random()*colors.length)]};animation-delay:${Math.random()*.5}s;animation-duration:${1.2+Math.random()*.8}s;`;document.body.appendChild(el);setTimeout(()=>el.remove(),2500);}}

renderToday();updateHeaderStats();
</script>
