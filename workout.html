<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workout">
<title>💪 Workout Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0A0A0F;
    --surface: rgba(255,255,255,0.06);
    --surface2: rgba(255,255,255,0.09);
    --border: rgba(255,255,255,0.09);
    --text: #F0F0F5;
    --muted: #888;
    --dim: #555;
    --accent: #FF6B35;
  }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sarabun', -apple-system, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased;
  }
  body { padding-bottom: env(safe-area-inset-bottom, 20px); }

  #bg-glow {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    transition: background 0.6s ease;
  }

  .app { position: relative; z-index: 1; max-width: 440px; margin: 0 auto; }

  /* HEADER */
  .header {
    padding: 48px 20px 20px;
    border-bottom: 1px solid var(--border);
  }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .header-label { font-size: 11px; color: #555; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 4px; }
  .header-day { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; }
  .header-theme { font-size: 14px; color: var(--muted); margin-top: 2px; }
  .points-box { text-align: right; }
  .points-num {
    font-size: 30px; font-weight: 900; line-height: 1;
    background: linear-gradient(135deg, #FFE66D, #FF6B35);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .points-label { font-size: 11px; color: #555; letter-spacing: 1px; }

  /* STATS */
  .stats { display: flex; gap: 10px; margin-top: 18px; }
  .stat-card {
    flex: 1; background: var(--surface); border-radius: 12px;
    padding: 10px 12px; border: 1px solid var(--border);
  }
  .stat-label { font-size: 10px; color: #555; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .stat-value { font-size: 20px; font-weight: 800; }
  .stat-sub { font-size: 10px; color: #444; margin-top: 1px; }

  /* TABS */
  .tabs { display: flex; padding: 14px 20px 0; gap: 8px; }
  .tab {
    flex: 1; padding: 9px 0; border-radius: 10px; border: none;
    font-size: 13px; font-weight: 700; cursor: pointer;
    font-family: inherit; transition: all 0.2s; outline: none;
    background: rgba(255,255,255,0.06); color: var(--muted);
  }
  .tab.active { color: #0A0A0F; }

  /* TODAY */
  .today-content { padding: 18px 20px 0; }
  .checkin-btn {
    width: 100%; padding: 20px; border-radius: 18px; border: none;
    font-size: 18px; font-weight: 800; letter-spacing: 1px;
    cursor: pointer; font-family: inherit; transition: all 0.3s;
    margin-bottom: 18px; outline: none;
  }
  .checkin-btn:active { transform: scale(0.97); }
  .section-label { font-size: 11px; color: #555; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
  .exercise-list { display: flex; flex-direction: column; gap: 10px; }
  .exercise-card {
    display: flex; align-items: center; gap: 14;
    background: var(--surface); border-radius: 14px;
    padding: 14px 16px; border: 1px solid var(--border);
    gap: 14px;
  }
  .ex-num {
    width: 32px; height: 32px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 13px;
  }
  .ex-name { font-weight: 700; font-size: 15px; }
  .ex-detail { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .rest-box {
    margin-top: 18px; padding: 14px 16px; border-radius: 14px;
    background: rgba(255,230,109,0.07); border: 1px solid rgba(255,230,109,0.2);
    margin-bottom: 24px;
  }
  .rest-title { font-size: 12px; color: #FFE66D; font-weight: 700; margin-bottom: 4px; }
  .rest-text { font-size: 12px; color: var(--muted); line-height: 1.8; }

  /* CALENDAR */
  .calendar-content { padding: 20px; }
  .cal-month { font-size: 14px; font-weight: 700; text-align: center; color: var(--muted); margin-bottom: 16px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-header { text-align: center; font-size: 11px; color: #444; font-weight: 600; padding: 4px 0; }
  .cal-day {
    aspect-ratio: 1; border-radius: 10px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-size: 11px; border: 1px solid var(--border);
    background: var(--surface); color: #444;
    transition: all 0.2s;
  }
  .cal-day.today { font-weight: 800; border-width: 2px; }
  .cal-day.checked { color: #fff; }
  .cal-day .sticker { font-size: 9px; line-height: 1; }
  .cal-legend { display: flex; gap: 16px; justify-content: center; margin-top: 16px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .legend-dot { width: 14px; height: 14px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }

  /* SCHEDULE */
  .schedule-content { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .sched-card { border-radius: 16px; overflow: hidden; border: 1px solid var(--border); background: rgba(255,255,255,0.03); }
  .sched-card.today-card { }
  .sched-header {
    padding: 12px 16px; display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .sched-emoji { font-size: 20px; }
  .sched-day { font-weight: 800; font-size: 14px; }
  .sched-theme { font-size: 12px; color: var(--muted); }
  .today-badge {
    margin-left: auto; font-size: 10px; font-weight: 700;
    padding: 3px 8px; border-radius: 20px; letter-spacing: 1px; color: #0A0A0F;
  }
  .sched-exercises { padding: 8px 16px 12px; }
  .sched-ex {
    display: flex; gap: 8px; align-items: baseline;
    padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 13px;
  }
  .sched-ex:last-child { border-bottom: none; }
  .sched-ex-num { font-weight: 700; min-width: 18px; font-size: 11px; }
  .sched-ex-name { font-weight: 600; }
  .sched-ex-detail { margin-left: auto; font-size: 11px; color: #444; }

  /* CONFETTI */
  .confetti-piece {
    position: fixed; top: -20px; border-radius: 2px;
    z-index: 1000; pointer-events: none;
    animation: fall 2.5s ease-in forwards;
  }

  /* CELEBRATION */
  #celebration {
    position: fixed; inset: 0; z-index: 999;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  #celebration.show { opacity: 1; pointer-events: all; }
  .celebration-inner { text-align: center; }
  .celebration-sticker { font-size: 90px; line-height: 1; margin-bottom: 16px; display: block; animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1); }
  .celebration-title { font-size: 28px; font-weight: 900; letter-spacing: 2px; }
  .celebration-pts { font-size: 16px; color: var(--muted); margin-top: 8px; }

  @keyframes fall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
  @keyframes popIn {
    0%   { transform: scale(0.2); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

  /* Install hint */
  #install-hint {
    position: fixed; bottom: calc(env(safe-area-inset-bottom,16px) + 8px); left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.1); backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px; padding: 10px 18px;
    font-size: 12px; color: rgba(255,255,255,0.7); text-align: center;
    white-space: nowrap; z-index: 100; cursor: pointer;
    animation: fadeIn 1s 2s both;
  }
</style>
</head>
<body>

<div id="bg-glow"></div>
<div class="app" id="app"></div>
<div id="celebration">
  <div class="celebration-inner">
    <span class="celebration-sticker" id="cel-sticker">🏅</span>
    <div class="celebration-title" id="cel-title">เช็คอินสำเร็จ!</div>
    <div class="celebration-pts">+10 แต้ม 🎯</div>
  </div>
</div>
<div id="install-hint" onclick="this.remove()">
  📲 แชร์ → "Add to Home Screen" เพื่อใช้แบบแอป
</div>

<script>
const SCHEDULE = {
  1: { label:"จันทร์", theme:"อก + แขน + ท้อง", emoji:"💪", color:"#FF6B35",
    exercises:[
      {name:"Push up", detail:"15 × 4 sets", rest:"พัก 60–90 วิ"},
      {name:"Dumbbell curl", detail:"12 × 4 sets"},
      {name:"Lateral raise", detail:"12 × 4 sets"},
      {name:"Leg raise", detail:"15 × 4 sets (ท้องล่าง)"},
      {name:"Ab wheel", detail:"10–15 × 4 sets"},
    ]},
  2: { label:"อังคาร", theme:"ขา + หลัง + core", emoji:"🦵", color:"#4ECDC4",
    exercises:[
      {name:"Squat", detail:"20 × 4 sets"},
      {name:"Dumbbell row", detail:"12 × 4 sets"},
      {name:"Shoulder press", detail:"12 × 4 sets"},
      {name:"Reverse crunch", detail:"15 × 4 sets"},
      {name:"Side plank", detail:"30–45 วิ × 3 / ข้าง"},
    ]},
  3: { label:"พุธ", theme:"วันท้อง (เน้นท้องล่าง + ข้าง)", emoji:"🔥", color:"#FFE66D",
    exercises:[
      {name:"Ab wheel", detail:"12 × 4 sets"},
      {name:"Leg raise", detail:"15 × 4 sets"},
      {name:"Oblique crunch", detail:"15 × 3 / ข้าง"},
      {name:"Russian twist", detail:"20 × 3 sets"},
      {name:"Plank", detail:"45 วิ × 3 sets"},
    ]},
  4: { label:"พฤหัส", theme:"พัก / คาร์ดิโอเบา", emoji:"🚶", color:"#A8DADC", rest:true,
    exercises:[
      {name:"เดินเร็ว", detail:"20 นาที"},
      {name:"วิ่งอยู่กับที่", detail:"5–10 นาที"},
    ]},
  5: { label:"ศุกร์", theme:"อก + ไหล่ + แขน", emoji:"🏋️", color:"#FF6B9D",
    exercises:[
      {name:"Push up", detail:"15 × 4 sets"},
      {name:"Shoulder press", detail:"12 × 4 sets"},
      {name:"Lateral raise", detail:"12 × 4 sets"},
      {name:"Dumbbell curl", detail:"12 × 4 sets"},
      {name:"Ab wheel", detail:"10–15 × 3 sets"},
    ]},
  6: { label:"เสาร์", theme:"หลัง + ขา + ท้องล่าง", emoji:"⚡", color:"#C77DFF",
    exercises:[
      {name:"Squat", detail:"20 × 4 sets"},
      {name:"Dumbbell row", detail:"12 × 4 sets"},
      {name:"Reverse crunch", detail:"15 × 4 sets"},
      {name:"Leg raise", detail:"15 × 4 sets"},
      {name:"Side plank", detail:"45 วิ × 3 sets"},
    ]},
  0: { label:"อาทิตย์", theme:"พักเต็มที่", emoji:"😴", color:"#6C757D", rest:true,
    exercises:[
      {name:"เดินเบาๆ", detail:"ตามอัธยาศัย"},
      {name:"ยืดกล้าม", detail:"ตามอัธยาศัย"},
    ]},
};

const STICKERS = ["🏅","⭐","🔥","💎","👑","🚀","💪","🎯","⚡","🌟"];
const MILESTONES = [
  {count:30, label:"ครบเดือน!", sticker:"🚀"},
  {count:14, label:"สองสัปดาห์!", sticker:"💎"},
  {count:7,  label:"ครบสัปดาห์!", sticker:"👑"},
  {count:3,  label:"สามวันติด!", sticker:"🔥"},
  {count:1,  label:"เริ่มต้นแล้ว!", sticker:"🌱"},
];

// --- Storage ---
function loadData() {
  try {
    const raw = localStorage.getItem('workout_v2');
    return raw ? JSON.parse(raw) : {checkIns:{}, points:0};
  } catch { return {checkIns:{}, points:0}; }
}
function saveData(d) {
  try { localStorage.setItem('workout_v2', JSON.stringify(d)); } catch {}
}

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function calcStreak(checkIns) {
  let streak = 0;
  const today = new Date(); today.setHours(0,0,0,0);
  for (let i = 0; i < 365; i++) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (checkIns[k]) streak++;
    else if (i > 0) break;
  }
  return streak;
}

function getMilestone(total) {
  return MILESTONES.find(m => total >= m.count) || null;
}

// --- State ---
let data = loadData();
let activeTab = 'today';
const dow = new Date().getDay();
const sched = SCHEDULE[dow];
const today = todayKey();

// --- Glow ---
function updateGlow() {
  document.getElementById('bg-glow').style.background =
    `radial-gradient(ellipse at 20% 20%, ${sched.color}18 0%, transparent 60%),
     radial-gradient(ellipse at 80% 80%, #C77DFF15 0%, transparent 60%)`;
}

// --- Confetti ---
function spawnConfetti() {
  const colors = ["#FF6B35","#4ECDC4","#FFE66D","#FF6B9D","#C77DFF"];
  for (let i = 0; i < 32; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left:${Math.random()*100}%;
      width:${8+Math.random()*8}px; height:${8+Math.random()*8}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-delay:${Math.random()*0.6}s;
      transform:rotate(${Math.random()*360}deg);
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3200);
  }
}

// --- Celebration ---
function showCelebration(sticker) {
  const cel = document.getElementById('celebration');
  document.getElementById('cel-sticker').textContent = sticker;
  document.getElementById('cel-title').style.color = sched.color;
  cel.classList.add('show');
  setTimeout(() => cel.classList.remove('show'), 2800);
}

// --- Check In ---
function handleCheckIn() {
  if (data.checkIns[today]) return;
  const sticker = STICKERS[Math.floor(Math.random()*STICKERS.length)];
  data.checkIns[today] = {sticker, time: new Date().toISOString()};
  data.points = (data.points || 0) + 10;
  saveData(data);
  spawnConfetti();
  showCelebration(sticker);
  render();
}

// --- Render ---
function render() {
  const total = Object.keys(data.checkIns).length;
  const streak = calcStreak(data.checkIns);
  const milestone = getMilestone(total);
  const checkedToday = !!data.checkIns[today];

  let html = '';

  // HEADER
  html += `<div class="header">
    <div class="header-top">
      <div>
        <div class="header-label">Workout Tracker</div>
        <div class="header-day">${sched.emoji} วัน${sched.label}</div>
        <div class="header-theme">${sched.theme}</div>
      </div>
      <div class="points-box">
        <div class="points-num">${data.points}</div>
        <div class="points-label">POINTS</div>
      </div>
    </div>
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Streak</div>
        <div class="stat-value">${streak} 🔥</div>
        <div class="stat-sub">วัน</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Check-ins</div>
        <div class="stat-value">${total}</div>
        <div class="stat-sub">ครั้ง</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Badge</div>
        <div class="stat-value">${milestone ? milestone.sticker : '—'}</div>
        <div class="stat-sub">${milestone ? milestone.label : 'ยังไม่มี'}</div>
      </div>
    </div>
  </div>`;

  // TABS
  html += `<div class="tabs">
    ${[['today','วันนี้'],['calendar','ปฏิทิน'],['schedule','ตาราง']].map(([id,label]) =>
      `<button class="tab ${activeTab===id?'active':''}" onclick="setTab('${id}')"
        style="${activeTab===id?`background:${sched.color};`:''}">
        ${label}
      </button>`
    ).join('')}
  </div>`;

  // TODAY TAB
  if (activeTab === 'today') {
    const btnStyle = checkedToday
      ? `background:rgba(255,255,255,0.07); border:2px solid ${sched.color}; color:${sched.color}; box-shadow:none; cursor:default;`
      : `background:linear-gradient(135deg,${sched.color},${sched.color}bb); border:none; color:#0A0A0F; box-shadow:0 8px 30px ${sched.color}44; cursor:pointer;`;

    html += `<div class="today-content">
      <button class="checkin-btn" style="${btnStyle}" onclick="handleCheckIn()">
        ${checkedToday ? `✓ เช็คอินแล้ววันนี้ ${data.checkIns[today].sticker}` : '⚡ CHECK IN วันนี้'}
      </button>
      <div class="section-label">${sched.rest ? 'ตัวเลือก' : 'ท่าออกกำลังกาย'}</div>
      <div class="exercise-list">
        ${sched.exercises.map((ex, i) => `
          <div class="exercise-card">
            <div class="ex-num" style="background:${sched.color}22; color:${sched.color};">${i+1}</div>
            <div>
              <div class="ex-name">${ex.name}</div>
              <div class="ex-detail">${ex.detail}${ex.rest ? ` · ${ex.rest}` : ''}</div>
            </div>
          </div>`).join('')}
      </div>
      <div class="rest-box">
        <div class="rest-title">⏱ เวลาพัก</div>
        <div class="rest-text">ระหว่างเซต: 60–90 วินาที<br>ระหว่างท่า: 90–120 วินาที</div>
      </div>
    </div>`;
  }

  // CALENDAR TAB
  if (activeTab === 'calendar') {
    const now = new Date();
    const year = now.getFullYear(), month = now.getMonth();
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const monthName = now.toLocaleDateString('th-TH', {month:'long', year:'numeric'});

    let calDays = '';
    for (let i = 0; i < firstDay; i++) calDays += '<div></div>';
    for (let d = 1; d <= daysInMonth; d++) {
      const key = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const checked = data.checkIns[key];
      const isToday = key === today;
      const bg = checked ? `${sched.color}28` : isToday ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.04)';
      const border = isToday ? `2px solid ${sched.color}` : '1px solid rgba(255,255,255,0.08)';
      const color = isToday ? sched.color : checked ? '#fff' : '#444';
      calDays += `<div class="cal-day${isToday?' today':''}${checked?' checked':''}"
        style="background:${bg}; border:${border}; color:${color};">
        <span>${d}</span>
        ${checked ? `<span class="sticker">${checked.sticker}</span>` : ''}
      </div>`;
    }

    html += `<div class="calendar-content">
      <div class="cal-month">${monthName}</div>
      <div class="cal-grid">
        ${['อา','จ','อ','พ','พฤ','ศ','ส'].map(d=>`<div class="cal-header">${d}</div>`).join('')}
        ${calDays}
      </div>
      <div class="cal-legend">
        <div class="legend-item">
          <div class="legend-dot" style="background:${sched.color}28;"></div> เช็คอินแล้ว
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:rgba(255,255,255,0.1); border:2px solid ${sched.color};"></div> วันนี้
        </div>
      </div>
    </div>`;
  }

  // SCHEDULE TAB
  if (activeTab === 'schedule') {
    const order = [1,2,3,4,5,6,0];
    html += `<div class="schedule-content">`;
    for (const d of order) {
      const s = SCHEDULE[d];
      const isToday2 = d === dow;
      html += `<div class="sched-card${isToday2?' today-card':''}"
        style="border-color:${isToday2 ? s.color : 'rgba(255,255,255,0.09)'}; background:${isToday2 ? s.color+'10' : 'rgba(255,255,255,0.03)'}">
        <div class="sched-header">
          <span class="sched-emoji">${s.emoji}</span>
          <div>
            <div class="sched-day" style="color:${s.color}">วัน${s.label}</div>
            <div class="sched-theme">${s.theme}</div>
          </div>
          ${isToday2 ? `<span class="today-badge" style="background:${s.color}">TODAY</span>` : ''}
        </div>
        <div class="sched-exercises">
          ${s.exercises.map((ex,i) => `
            <div class="sched-ex">
              <span class="sched-ex-num" style="color:${s.color}">${i+1}.</span>
              <span class="sched-ex-name">${ex.name}</span>
              <span class="sched-ex-detail">${ex.detail}</span>
            </div>`).join('')}
        </div>
      </div>`;
    }
    html += `</div>`;
  }

  document.getElementById('app').innerHTML = html;
}

function setTab(id) {
  activeTab = id;
  render();
}

// Init
updateGlow();
render();

// Auto-dismiss install hint
setTimeout(() => {
  const hint = document.getElementById('install-hint');
  if (hint) hint.remove();
}, 8000);
</script>
